<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BUBBLE_TITLE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #1c1c1f;
    --surface: rgba(255,255,255,0.05);
    --surface-solid: #242327;
    --surface-alt: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.12);
    --text: #eef1f8;
    --text-soft: #aab2c5;
    --text-faint: #6e7690;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.16);
    --accent-glow: rgba(91,140,255,0.55);
    --accent-dark: #3a63d4;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --blur: 18px;
    --ease: cubic-bezier(.2,.8,.2,1);
  }

  [data-theme="blue"]   { --accent: #5b8cff; --accent-soft: rgba(91,140,255,0.16); --accent-glow: rgba(91,140,255,0.55); --accent-dark: #3a63d4; }
  [data-theme="green"]  { --accent: #3fd690; --accent-soft: rgba(63,214,144,0.16); --accent-glow: rgba(63,214,144,0.55); --accent-dark: #1f9c64; }
  [data-theme="purple"] { --accent: #a684ff; --accent-soft: rgba(166,132,255,0.16); --accent-glow: rgba(166,132,255,0.55); --accent-dark: #7c54e0; }
  [data-theme="orange"] { --accent: #ff9d4d; --accent-soft: rgba(255,157,77,0.16); --accent-glow: rgba(255,157,77,0.55); --accent-dark: #e07820; }
  [data-theme="red"]    { --accent: #ef4444; --accent-soft: rgba(239,68,68,0.16); --accent-glow: rgba(239,68,68,0.55); --accent-dark: #c62828; }

  body[data-mode="light"] {
    --bg: #f6f1e8;
    --surface: rgba(255,255,255,0.7);
    --surface-solid: #ffffff;
    --surface-alt: rgba(20,23,31,0.04);
    --border: rgba(20,23,31,0.1);
    --text: #181a20;
    --text-soft: #565d6e;
    --text-faint: #8990a3;
    --shadow: 0 8px 28px rgba(20,30,60,0.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* Hide scrollbars everywhere — scrolling still works, just no visible track/thumb.
     Part of the shared chrome; keep this block in every template. */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background-color .25s ease, color .25s ease;
    min-height: 100vh;
    overflow: hidden;
  }

  .settings-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .settings-toggle:hover { border-color: var(--accent-glow); transform: translateY(-1px); }
  .settings-toggle svg { width: 18px; height: 18px; }

  .settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 100;
    width: 224px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .settings-panel[hidden] { display: none; }

  .settings-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .theme-dots { display: flex; gap: 8px; }
  .theme-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .theme-dot[data-t="blue"]   { background: #5b8cff; }
  .theme-dot[data-t="green"]  { background: #3fd690; }
  .theme-dot[data-t="purple"] { background: #a684ff; }
  .theme-dot[data-t="orange"] { background: #ff9d4d; }
  .theme-dot[data-t="red"]    { background: #ef4444; }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 10px var(--accent-glow); }

  .settings-panel button.tool-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .settings-panel button.tool-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .settings-panel button.tool-btn.primary {
    background: var(--accent); color: #0a0c12; border-color: var(--accent);
    box-shadow: 0 0 18px var(--accent-glow);
  }
  .settings-panel button.tool-btn.primary:hover { background: var(--accent-dark); }

  #doc { position: relative; height: 100vh; overflow: hidden; }

  .doc-header {
    position: absolute;
    top: 28px;
    left: 24px;
    z-index: 5;
    max-width: 420px;
    text-align: left;
    pointer-events: none;
  }
  .doc-eyebrow {
    display: inline-block;
    font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-glow);
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 8px;
  }
  .doc-title { font-size: clamp(19px, 2.4vw, 25px); font-weight: 800; margin: 0 0 5px; line-height: 1.2; letter-spacing: -.01em; }
  .doc-subtitle { font-size: 13px; color: var(--text-soft); margin: 0; line-height: 1.45; max-width: 420px; }

  .canvas-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: .02em;
    white-space: nowrap;
    pointer-events: none;
  }

  .doc-footer {
    position: absolute;
    bottom: 18px;
    right: 24px;
    z-index: 5;
    font-size: 12px;
    color: var(--text-faint);
    pointer-events: none;
  }

  /* Scrollable viewport onto the (usually much larger) canvas. Scrollbars are
     hidden by the sitewide rule above — click-and-drag panning (wired in JS)
     is the discoverable way to explore a map bigger than the viewport. */
  #canvas-wrap {
    position: absolute;
    inset: 0;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }

  /* #canvas is sized in JS to exactly fit the computed layout (2x the
     outermost bubble radius, plus margin). Every bubble inside is an
     absolutely-positioned sibling placed via the --cx/--cy/--d custom
     properties computed by layoutBubbles() — never hand-place one. */
  #canvas { position: relative; flex-shrink: 0; }

  .bubble {
    position: absolute;
    left: var(--cx);
    top: var(--cy);
    width: var(--d);
    height: var(--d);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: width .4s var(--ease), height .4s var(--ease), border-radius .4s var(--ease),
                opacity .3s ease, box-shadow .3s ease, background .2s ease;
  }
  .bubble.dimmed { opacity: 0.25; }

  /* Level 1 — theme bubbles */
  .theme-bubble {
    z-index: 1;
    background: var(--accent-soft);
    border: 2px solid var(--accent);
    box-shadow: 0 0 0 1px transparent;
    flex-direction: column;
    gap: 4px;
    padding: 10px;
  }
  .theme-bubble.active { box-shadow: 0 0 0 4px var(--accent-soft), 0 0 30px var(--accent-glow); }
  .theme-label { font-weight: 800; line-height: 1.2; font-size: calc(var(--d) * 0.11); color: var(--text); }
  .theme-count { font-size: calc(var(--d) * 0.075); color: var(--text-faint); font-weight: 600; }

  /* Level 2 — satellites.
     IMPORTANT: the collapsed dot and the expanded content are TWO separate
     elements, not one div morphing its width/height/border-radius. A single
     flex-centered, overflow:hidden circle cannot also hold multi-paragraph
     wrapped text without the content reading as "crammed into a bubble" —
     that was a real bug caught in review. render-timeline avoids this by
     keeping its dot button and its node-panel as siblings; follow that same
     shape here: .satellite-dot never resizes, .satellite-panel is a normal
     block-layout card that fades/scales in on top of it, concentric on the
     same --cx/--cy center (so it reads as "the dot grew into this"). */
  .satellite-dot {
    z-index: 2;
    background: var(--surface-solid);
    border: 3px solid var(--accent);
    color: var(--accent);
    font-weight: 800;
    font-size: 18px;
  }
  .satellite-dot:hover { box-shadow: var(--shadow), 0 0 0 5px var(--accent-soft); }
  .satellite-dot.expanded {
    background: var(--accent);
    color: #0a0c12;
    box-shadow: var(--shadow), 0 0 0 6px var(--accent-soft);
  }

  .satellite-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
    max-width: 130px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-soft);
    line-height: 1.3;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .satellite-dot.expanded .satellite-label { opacity: 0; }

  /* Shared "detail card" mechanics for both the satellite panel and the
     image sub-bubble panel: positioned at the same center as their dot,
     starts scaled-down/invisible/non-interactive, scales up to full size
     and fades in on .expanded. No width/height/border-radius transition,
     no overflow:hidden wrapper fighting an inner scroll area — just one
     normal block box with its own overflow-y:auto, exactly like
     render-timeline's .node-panel. */
  .detail-panel {
    position: absolute;
    left: var(--cx);
    top: var(--cy);
    transform: translate(-50%, -50%) scale(0.82);
    opacity: 0;
    pointer-events: none;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    box-shadow: var(--shadow), 0 0 0 1px var(--accent-soft);
    overflow-y: auto;
    cursor: default;
    transition: transform .35s var(--ease), opacity .3s ease, box-shadow .3s ease;
  }
  .detail-panel { scrollbar-width: thin; scrollbar-color: var(--accent-glow) transparent; }
  .detail-panel::-webkit-scrollbar { display: block; width: 5px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 6px; }
  .detail-panel.expanded {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  .satellite-panel {
    width: min(440px, 82vw);
    max-height: min(520px, 70vh);
    border-radius: 22px;
    padding: 26px;
    text-align: left;
    z-index: 50;
  }
  .satellite-panel.expanded { box-shadow: var(--shadow), 0 0 0 1px var(--accent-soft), 0 0 40px var(--accent-glow); }
  .satellite-heading { margin: 0 0 10px; font-size: 19px; font-weight: 800; color: var(--text); }
  .satellite-body p { margin: 0 0 10px; font-size: 14.5px; line-height: 1.55; color: var(--text); }

  .panel-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }

  /* Level 3 — image sub-bubbles, pre-positioned but hidden until the parent
     satellite expands (see .subcluster[hidden]). Position is fixed from the
     start so expansion never needs to recompute anything. */
  .subcluster[hidden] { display: none; }

  .subbubble-dot {
    z-index: 51;
    background: var(--surface-solid);
    border: 2px solid var(--accent);
    overflow: hidden;
  }
  .subbubble-dot:hover { box-shadow: var(--shadow), 0 0 0 4px var(--accent-soft); }
  .subbubble-dot img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .subbubble-dot.expanded { box-shadow: var(--shadow), 0 0 0 5px var(--accent-soft); }

  .subbubble-panel {
    width: min(360px, 70vw);
    max-height: min(420px, 60vh);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    z-index: 60;
  }
  .subbubble-panel.expanded { box-shadow: var(--shadow), 0 0 0 1px var(--accent-soft), 0 0 34px var(--accent-glow); }
  .subbubble-full { display: block; width: 100%; max-height: 260px; object-fit: contain; border-radius: 8px; }
  .subbubble-caption { margin: 0; font-size: 13px; font-style: italic; color: var(--text-soft); line-height: 1.4; }

  @media print {
    .settings-toggle, .settings-panel, .canvas-hint { display: none; }
    #canvas-wrap { overflow: visible; position: static; }
    body, #doc { overflow: visible; height: auto; }
  }
</style>
</head>
<body data-theme="blue" data-mode="dark">

  <button class="settings-toggle" id="settings-toggle" aria-label="Settings" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
    </svg>
  </button>

  <div class="settings-panel" id="settings-panel" hidden>
    <div>
      <div class="settings-label">Theme</div>
      <div class="theme-dots" id="theme-dots">
        <button class="theme-dot active" data-t="blue" title="Blue"></button>
        <button class="theme-dot" data-t="green" title="Green"></button>
        <button class="theme-dot" data-t="purple" title="Purple"></button>
        <button class="theme-dot" data-t="orange" title="Orange"></button>
        <button class="theme-dot" data-t="red" title="Red"></button>
      </div>
    </div>
    <button class="tool-btn" id="mode-toggle">☀️ Light</button>
    <button class="tool-btn primary" id="pdf-btn">⬇ Download PDF</button>
  </div>

  <div id="doc">

    <div class="doc-header">
      <div class="doc-eyebrow">Bubble Map</div>
      <h1 class="doc-title">{{BUBBLE_TITLE}}</h1>
      <p class="doc-subtitle">{{BUBBLE_SUBTITLE}}</p>
    </div>

    <div id="canvas-wrap">
      <div id="canvas"></div>
    </div>

    <p class="canvas-hint">scroll or drag to explore · click a bubble to expand</p>
    <div class="doc-footer">{{AUTHOR}}</div>

  </div>

  <script type="application/json" id="bubble-data">{{BUBBLE_DATA}}</script>

<script>
  (function () {
    var body = document.body;

    var settingsToggle = document.getElementById('settings-toggle');
    var settingsPanel = document.getElementById('settings-panel');
    settingsToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = settingsPanel.hidden;
      settingsPanel.hidden = !willOpen;
      settingsToggle.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!settingsPanel.hidden && !settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
        settingsPanel.hidden = true;
        settingsToggle.setAttribute('aria-expanded', 'false');
      }
    });

    var dots = document.querySelectorAll('.theme-dot');
    dots.forEach(function (dot) {
      dot.addEventListener('click', function () {
        body.setAttribute('data-theme', dot.getAttribute('data-t'));
        dots.forEach(function (d) { d.classList.remove('active'); });
        dot.classList.add('active');
      });
    });

    var modeBtn = document.getElementById('mode-toggle');
    modeBtn.addEventListener('click', function () {
      var isLight = body.getAttribute('data-mode') === 'light';
      body.setAttribute('data-mode', isLight ? 'dark' : 'light');
      modeBtn.textContent = isLight ? '☀️ Light' : '🌙 Dark';
    });

    var pdfBtn = document.getElementById('pdf-btn');
    pdfBtn.addEventListener('click', function () {
      var el = document.getElementById('canvas');
      var opt = {
        margin: 0.4,
        filename: '{{BUBBLE_TITLE}}.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(el).save();
    });

    // ---- Radial layout engine ---------------------------------------------

    var THEME_MIN_D = 120, THEME_MAX_D = 280, THEME_GAP = 28;
    var SATELLITE_D = 64, SATELLITE_GAP = 16, PARENT_GAP = 20;
    var SUBBUBBLE_D = 56, SUBBUBBLE_GAP = 14, SUBBUBBLE_PARENT_GAP = 18;
    var CANVAS_MARGIN = 70;

    // Expanded satellite panels are rounded rects, not circles, and can grow
    // taller than they are wide if a slide has a lot of body text (max
    // 440px wide, up to 520px tall — see .satellite.expanded). Sub-bubbles
    // need to clear the panel's actual corner, not just its width, so this
    // is the half-diagonal of the largest the panel can get, not a flat guess.
    var EXPANDED_W = Math.min(440, window.innerWidth * 0.82);
    var EXPANDED_H = Math.min(520, window.innerHeight * 0.70);
    var EXPANDED_RADIUS = Math.sqrt(EXPANDED_W * EXPANDED_W + EXPANDED_H * EXPANDED_H) / 2;

    // Smallest ring radius that keeps N circles (radii[]) evenly spaced by
    // angle from overlapping, given a minimum gap between adjacent edges.
    // See SKILL.md Step 3 for the derivation.
    function ringRadius(radii, gap) {
      var n = radii.length;
      if (n <= 1) return 0;
      var maxR = 0;
      for (var i = 0; i < n; i++) {
        var j = (i + 1) % n;
        var need = radii[i] + radii[j] + gap;
        var r = need / (2 * Math.sin(Math.PI / n));
        if (r > maxR) maxR = r;
      }
      return maxR;
    }

    // Reorders items so the largest and smallest alternate around the ring —
    // keeps two big circles from landing adjacent and forcing an unnecessarily
    // large ring. A tightness optimization, not a correctness requirement.
    function orderForPacking(items, sizeOf) {
      var sorted = items.slice().sort(function (a, b) { return sizeOf(b) - sizeOf(a); });
      var result = [];
      var i = 0, j = sorted.length - 1;
      var front = true;
      while (i <= j) {
        if (front) { result.push(sorted[i++]); } else { result.push(sorted[j--]); }
        front = !front;
      }
      return result;
    }

    function polar(cx, cy, r, angle) {
      return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
    }

    function angleFor(i, n) {
      return (i * (2 * Math.PI / n)) - Math.PI / 2;
    }

    function el(tag, className) {
      var e = document.createElement(tag);
      if (className) e.className = className;
      return e;
    }

    function setGeometry(node, cx, cy, d) {
      node.style.setProperty('--cx', cx + 'px');
      node.style.setProperty('--cy', cy + 'px');
      node.style.setProperty('--d', d + 'px');
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str == null ? '' : String(str);
      return d.innerHTML;
    }

    // ---- Interaction state --------------------------------------------------

    var allThemeEls = [];
    var allSatelliteEls = [];
    var expandedSatellite = null;

    function collapseSubbubbles(satEl) {
      if (!satEl._subclusterEl) return;
      var pairs = satEl._subclusterEl._pairs || [];
      pairs.forEach(function (p) {
        p.dot.classList.remove('expanded', 'dimmed');
        p.panel.classList.remove('expanded', 'dimmed');
      });
    }

    function collapseAll() {
      allThemeEls.forEach(function (t) { t.classList.remove('active', 'dimmed'); });
      allSatelliteEls.forEach(function (s) {
        s.dot.classList.remove('expanded', 'dimmed');
        s.panel.classList.remove('expanded');
        collapseSubbubbles(s.dot);
        if (s.dot._subclusterEl) s.dot._subclusterEl.hidden = true;
      });
      expandedSatellite = null;
    }

    function selectSatellite(sat) {
      var reopening = expandedSatellite === sat;
      collapseAll();
      if (reopening) return;

      sat.dot.classList.add('expanded');
      sat.panel.classList.add('expanded');
      sat.dot._themeEl.classList.add('active');
      allThemeEls.forEach(function (t) { if (t !== sat.dot._themeEl) t.classList.add('dimmed'); });
      allSatelliteEls.forEach(function (s) { if (s !== sat) s.dot.classList.add('dimmed'); });
      if (sat.dot._subclusterEl) sat.dot._subclusterEl.hidden = false;
      expandedSatellite = sat;
    }

    function selectSubbubble(sub, satDot) {
      var pairs = satDot._subclusterEl._pairs;
      var reopening = sub.dot.classList.contains('expanded');
      pairs.forEach(function (p) { p.dot.classList.remove('expanded', 'dimmed'); p.panel.classList.remove('expanded'); });
      if (reopening) return;
      sub.dot.classList.add('expanded');
      sub.panel.classList.add('expanded');
      pairs.forEach(function (p) { if (p !== sub) p.dot.classList.add('dimmed'); });
    }

    // ---- Build ---------------------------------------------------------------

    function layoutBubbles(data) {
      var canvas = document.getElementById('canvas');
      var themes = data.themes || [];
      if (themes.length === 0) return;

      var maxCount = Math.max.apply(null, themes.map(function (t) { return t.slides.length; }));

      // Pass 1: per-theme own radius + satellite orbit + effective cluster radius.
      var themeInfo = themes.map(function (theme) {
        var count = theme.slides.length;
        var ownRadius = (THEME_MIN_D + (THEME_MAX_D - THEME_MIN_D) * Math.sqrt(count / maxCount)) / 2;
        var satRadii = theme.slides.map(function () { return SATELLITE_D / 2; });
        var satOrbit = Math.max(
          ringRadius(satRadii, SATELLITE_GAP),
          ownRadius + SATELLITE_D / 2 + PARENT_GAP
        );
        var effectiveRadius = satOrbit + SATELLITE_D / 2;
        return { theme: theme, ownRadius: ownRadius, satOrbit: satOrbit, effectiveRadius: effectiveRadius };
      });

      // Pass 2: pack theme clusters on the outer ring using effective radius.
      var packedThemes = orderForPacking(themeInfo, function (t) { return t.effectiveRadius; });
      var outerRing = ringRadius(packedThemes.map(function (t) { return t.effectiveRadius; }), THEME_GAP);

      var maxEffective = Math.max.apply(null, themeInfo.map(function (t) { return t.effectiveRadius; }));
      var canvasR = outerRing + maxEffective + CANVAS_MARGIN;
      var canvasSize = canvasR * 2;
      canvas.style.width = canvasSize + 'px';
      canvas.style.height = canvasSize + 'px';
      var cx = canvasSize / 2, cy = canvasSize / 2;

      packedThemes.forEach(function (info, i) {
        var n = packedThemes.length;
        var angle = angleFor(i, n);
        var themeCenter = n === 1 ? { x: cx, y: cy } : polar(cx, cy, outerRing, angle);

        var themeEl = el('div', 'bubble theme-bubble');
        setGeometry(themeEl, themeCenter.x, themeCenter.y, info.ownRadius * 2);
        themeEl.innerHTML =
          '<div class="theme-label">' + escapeHtml(info.theme.name) + '</div>' +
          '<div class="theme-count">' + info.theme.slides.length + ' slide' + (info.theme.slides.length === 1 ? '' : 's') + '</div>';
        canvas.appendChild(themeEl);
        allThemeEls.push(themeEl);

        var slideRadii = info.theme.slides.map(function () { return SATELLITE_D / 2; });
        var orderedSlides = orderForPacking(info.theme.slides.map(function (s, idx) { return { slide: s, idx: idx }; }), function () { return SATELLITE_D / 2; });

        orderedSlides.forEach(function (wrapped, si) {
          var slide = wrapped.slide;
          var m = orderedSlides.length;
          var satAngle = m === 1 ? -Math.PI / 2 : angleFor(si, m);
          var satCenter = polar(themeCenter.x, themeCenter.y, info.satOrbit, satAngle);

          // Dot: the small, always-circular collapsed representation. It
          // never resizes — see the CSS comment on .satellite-dot for why.
          var dotEl = el('div', 'bubble satellite-dot');
          setGeometry(dotEl, satCenter.x, satCenter.y, SATELLITE_D);
          dotEl._themeEl = themeEl;

          var shortLabel = (slide.heading || '').split(/\s+/).slice(0, 5).join(' ');
          dotEl.innerHTML =
            (slide.index != null ? slide.index : si + 1) +
            '<div class="satellite-label">' + escapeHtml(shortLabel) + '</div>';
          canvas.appendChild(dotEl);

          // Panel: a separate card, concentric with the dot, hidden/scaled-down
          // until expanded. Never the same element as the dot.
          var bodyHtml = (slide.body || []).map(function (p) { return '<p>' + escapeHtml(p) + '</p>'; }).join('');
          var panelEl = el('div', 'detail-panel satellite-panel');
          setGeometry(panelEl, satCenter.x, satCenter.y, SATELLITE_D);
          panelEl.innerHTML =
            '<button class="panel-close" aria-label="Collapse">✕</button>' +
            '<h3 class="satellite-heading">' + escapeHtml(slide.heading) + '</h3>' +
            '<div class="satellite-body">' + bodyHtml + '</div>';
          canvas.appendChild(panelEl);

          var sat = { dot: dotEl, panel: panelEl };
          allSatelliteEls.push(sat);

          function bindExpandToggle(dot, panel, onSelect) {
            dot.addEventListener('click', function (e) {
              e.stopPropagation();
              onSelect();
            });
            panel.addEventListener('click', function (e) {
              e.stopPropagation();
              if (e.target.closest('.panel-close')) { onSelect(); }
              // clicks elsewhere inside the open panel shouldn't collapse it
            });
          }
          bindExpandToggle(dotEl, panelEl, function () { selectSatellite(sat); });

          // Level 3 — pre-position image sub-bubbles around this satellite's
          // fixed center, hidden until the satellite expands.
          var images = slide.images || [];
          if (images.length > 0) {
            var subcluster = el('div', 'subcluster');
            subcluster.hidden = true;
            subcluster._pairs = [];
            canvas.appendChild(subcluster);
            dotEl._subclusterEl = subcluster;

            var subRadii = images.map(function () { return SUBBUBBLE_D / 2; });
            var subOrbit = Math.max(
              ringRadius(subRadii, SUBBUBBLE_GAP),
              EXPANDED_RADIUS + SUBBUBBLE_D / 2 + SUBBUBBLE_PARENT_GAP
            );

            images.forEach(function (image, ii) {
              var n2 = images.length;
              var imgAngle = n2 === 1 ? Math.PI / 2 : angleFor(ii, n2);
              var subCenter = polar(satCenter.x, satCenter.y, subOrbit, imgAngle);

              var subDotEl = el('div', 'bubble subbubble-dot');
              setGeometry(subDotEl, subCenter.x, subCenter.y, SUBBUBBLE_D);
              subDotEl.innerHTML = '<img src="' + image.src + '" alt="">';
              subcluster.appendChild(subDotEl);

              var subPanelEl = el('div', 'detail-panel subbubble-panel');
              setGeometry(subPanelEl, subCenter.x, subCenter.y, SUBBUBBLE_D);
              subPanelEl.innerHTML =
                '<button class="panel-close" aria-label="Collapse">✕</button>' +
                '<img class="subbubble-full" src="' + image.src + '" alt="">' +
                '<p class="subbubble-caption">' + escapeHtml(image.caption || '') + '</p>';
              subcluster.appendChild(subPanelEl);

              var sub = { dot: subDotEl, panel: subPanelEl };
              subcluster._pairs.push(sub);
              bindExpandToggle(subDotEl, subPanelEl, function () { selectSubbubble(sub, dotEl); });
            });
          }
        });
      });

      // Center the initial scroll position on the whole map.
      var wrap = document.getElementById('canvas-wrap');
      wrap.scrollLeft = (canvasSize - wrap.clientWidth) / 2;
      wrap.scrollTop = (canvasSize - wrap.clientHeight) / 2;
    }

    var raw = document.getElementById('bubble-data').textContent;
    layoutBubbles(JSON.parse(raw));

    document.getElementById('canvas-wrap').addEventListener('click', function (e) {
      if (e.target.id === 'canvas-wrap' || e.target.id === 'canvas') collapseAll();
    });

    // Click-and-drag panning — scrollbars are hidden sitewide, so this is the
    // discoverable way to explore a map bigger than the viewport.
    (function enableDragPan() {
      var wrap = document.getElementById('canvas-wrap');
      var isDown = false, startX, startY, startLeft, startTop;
      wrap.addEventListener('mousedown', function (e) {
        if (e.target.closest('.bubble')) return;
        isDown = true;
        wrap.classList.add('dragging');
        startX = e.pageX; startY = e.pageY;
        startLeft = wrap.scrollLeft; startTop = wrap.scrollTop;
      });
      window.addEventListener('mouseup', function () { isDown = false; wrap.classList.remove('dragging'); });
      window.addEventListener('mousemove', function (e) {
        if (!isDown) return;
        e.preventDefault();
        wrap.scrollLeft = startLeft - (e.pageX - startX);
        wrap.scrollTop = startTop - (e.pageY - startY);
      });
    })();
  })();
</script>

</body>
</html>

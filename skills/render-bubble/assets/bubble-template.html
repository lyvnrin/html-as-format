<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BUBBLE_TITLE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #1c1c1f;
    --surface: rgba(255,255,255,0.05);
    --surface-solid: #242327;
    --surface-alt: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.12);
    --text: #eef1f8;
    --text-soft: #aab2c5;
    --text-faint: #6e7690;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.16);
    --accent-glow: rgba(91,140,255,0.55);
    --accent-dark: #3a63d4;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --blur: 18px;
    --ease: cubic-bezier(.2,.8,.2,1);
    /* Slight overshoot ("back out") curve — used only for slide bubbles
       clearing space around an expanding neighbor (see .slide-bubble and
       relaxNeighbors() in the script). Deliberately different from --ease:
       that calm curve is for chrome/fades: this one is for bubbles
       physically nudging each other aside, which is supposed to read as
       organic/springy, not smooth. Don't use this for panel/dot fades. */
    --spring-ease: cubic-bezier(.34, 1.56, .64, 1);
  }

  [data-theme="blue"]   { --accent: #5b8cff; --accent-soft: rgba(91,140,255,0.16); --accent-glow: rgba(91,140,255,0.55); --accent-dark: #3a63d4; }
  [data-theme="green"]  { --accent: #3fd690; --accent-soft: rgba(63,214,144,0.16); --accent-glow: rgba(63,214,144,0.55); --accent-dark: #1f9c64; }
  [data-theme="purple"] { --accent: #a684ff; --accent-soft: rgba(166,132,255,0.16); --accent-glow: rgba(166,132,255,0.55); --accent-dark: #7c54e0; }
  [data-theme="orange"] { --accent: #ff9d4d; --accent-soft: rgba(255,157,77,0.16); --accent-glow: rgba(255,157,77,0.55); --accent-dark: #e07820; }
  [data-theme="red"]    { --accent: #ef4444; --accent-soft: rgba(239,68,68,0.16); --accent-glow: rgba(239,68,68,0.55); --accent-dark: #c62828; }

  body[data-mode="light"] {
    --bg: #f6f1e8;
    --surface: rgba(255,255,255,0.7);
    --surface-solid: #ffffff;
    --surface-alt: rgba(20,23,31,0.04);
    --border: rgba(20,23,31,0.1);
    --text: #181a20;
    --text-soft: #565d6e;
    --text-faint: #8990a3;
    --shadow: 0 8px 28px rgba(20,30,60,0.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* Hide scrollbars everywhere — scrolling still works, just no visible track/thumb.
     Part of the shared chrome; keep this block in every template. */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background-color .25s ease, color .25s ease;
    min-height: 100vh;
    overflow: hidden;
  }

  .settings-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .settings-toggle:hover { border-color: var(--accent-glow); transform: translateY(-1px); }
  .settings-toggle svg { width: 18px; height: 18px; }

  .settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 100;
    width: 224px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .settings-panel[hidden] { display: none; }

  .settings-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .theme-dots { display: flex; gap: 8px; }
  .theme-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .theme-dot[data-t="blue"]   { background: #5b8cff; }
  .theme-dot[data-t="green"]  { background: #3fd690; }
  .theme-dot[data-t="purple"] { background: #a684ff; }
  .theme-dot[data-t="orange"] { background: #ff9d4d; }
  .theme-dot[data-t="red"]    { background: #ef4444; }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); box-shadow: 0 0 10px var(--accent-glow); }

  .settings-panel button.tool-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .settings-panel button.tool-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .settings-panel button.tool-btn.primary {
    background: var(--accent); color: #0a0c12; border-color: var(--accent);
    box-shadow: 0 0 18px var(--accent-glow);
  }
  .settings-panel button.tool-btn.primary:hover { background: var(--accent-dark); }

  #doc { position: relative; height: 100vh; overflow: hidden; }

  .doc-header {
    position: absolute;
    top: 28px;
    left: 24px;
    z-index: 5;
    max-width: 420px;
    text-align: left;
    pointer-events: none;
  }
  /* A soft scrim, not a card — the bubble map is the main focus, the
     header is just legible on top of it. A hard-edged background box
     here would compete with the bubbles for attention (a title bar
     sitting on top of a bubble reads as two things fighting each other);
     a radial gradient in the page's own --bg colour, strongest right
     behind the text and fully transparent by ~default padding out, lets
     whatever bubble happens to scroll underneath stay visible at the
     edges while keeping the text reliably readable, without ever
     reading as its own rectangle. */
  .doc-header::before {
    content: '';
    position: absolute;
    inset: -22px -36px -30px -20px;
    background: radial-gradient(ellipse 120% 100% at 0% 25%,
      var(--bg) 0%, color-mix(in srgb, var(--bg) 65%, transparent) 45%, transparent 78%);
    z-index: -1;
    pointer-events: none;
  }
  .doc-eyebrow {
    display: inline-block;
    font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-glow);
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 8px;
  }
  .doc-title { font-size: clamp(19px, 2.4vw, 25px); font-weight: 800; margin: 0 0 5px; line-height: 1.2; letter-spacing: -.01em; }
  .doc-subtitle { font-size: 13px; color: var(--text-soft); margin: 0; line-height: 1.45; max-width: 420px; }

  .canvas-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: .02em;
    white-space: nowrap;
    pointer-events: none;
  }

  .doc-footer {
    position: absolute;
    bottom: 18px;
    right: 24px;
    z-index: 5;
    font-size: 12px;
    color: var(--text-faint);
    pointer-events: none;
  }

  /* Scrollable viewport onto the (usually much larger) canvas. Scrollbars are
     hidden by the sitewide rule above — click-and-drag panning (wired in JS)
     is the discoverable way to explore a map bigger than the viewport. */
  /* NOT display:flex + align-items/justify-content:center — that combo on
     a scrollable (overflow:auto) container is a real CSS trap: once the
     child is bigger than the wrap (which is the normal case once a deck
     has more than a handful of slides), flex's default ("unsafe") center
     alignment lets the child overflow equally on both sides, but negative
     scroll offsets don't exist — so the overflow on the leading side
     (roughly the top-left of the canvas) becomes permanently unreachable,
     clipped and unscrollable. That's what "bubbles overflowing off
     screen and unreachable" was. Plain block layout has no such trap:
     the canvas sits at (0,0) inside the wrap and every pixel of it is
     reachable across the full scroll range. The "starts centered on
     load" look is achieved entirely by the JS setting scrollLeft/scrollTop
     after layout (see layoutBubbles()) — don't reintroduce flex centering
     here to try to get that for free, it's what breaks reachability. */
  #canvas-wrap {
    position: absolute;
    inset: 0;
    overflow: auto;
    cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }

  /* #canvas is sized in JS to exactly fit the computed layout (2x the
     outermost bubble radius, plus margin). Every bubble inside is an
     absolutely-positioned sibling placed via the --cx/--cy/--d custom
     properties computed by layoutBubbles() — never hand-place one. */
  #canvas { position: relative; }

  .bubble {
    position: absolute;
    left: var(--cx);
    top: var(--cy);
    width: var(--d);
    height: var(--d);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: width .4s var(--ease), height .4s var(--ease), border-radius .4s var(--ease),
                opacity .3s ease, box-shadow .3s ease, background .2s ease;
  }
  .bubble.dimmed { opacity: 0.25; }

  /* Level 1 — slide bubbles, the main unit of the map (one per slide, not
     per theme — see SKILL.md). Packed edge-to-edge by the force-relaxation
     packer in the script, never orbiting a ring around a parent, so there
     are no big empty gaps between clusters. Coloured per-theme via --cat,
     set inline per bubble; the theme itself has no bubble of its own. */
  .slide-bubble {
    z-index: 1;
    /* Solidly filled, not a faint tint — the whole point of PARENT_CAT/
       CHILD_CAT (see script) is a visible dark-vs-light contrast between
       parent and child bubbles, which a low-opacity wash over the page
       background couldn't show. */
    background: color-mix(in srgb, var(--cat) 78%, transparent);
    border: 2.5px solid var(--cat);
    flex-direction: column;
    gap: 2px;
    padding: 8px;
    /* Overrides .bubble's base transition list to add left/top with a
       springy overshoot curve — this is what makes neighbors nudged aside
       by relaxNeighbors() (see script) settle with an organic wobble
       instead of a flat glide. Width/height/border-radius are dropped
       here since a slide bubble's size never changes after layout. */
    transition: left .55s var(--spring-ease), top .55s var(--spring-ease),
                opacity .3s ease, box-shadow .3s ease;
  }
  /* The glow uses --accent-glow (bright), not --cat (dark for a slide
     bubble) — a dark colour makes a poor-looking glow. --cat still drives
     the fill/border; only the selection halo borrows the bright accent. */
  .slide-bubble.active { box-shadow: 0 0 0 4px var(--accent-soft), 0 0 30px var(--accent-glow); z-index: 40; }
  /* Fixed light text, not var(--text) — a slide bubble's fill (PARENT_CAT)
     is always darkened toward black regardless of light/dark page mode,
     so text needs to stay light in both modes, not flip with the page. */
  .slide-index {
    position: absolute; top: 7px; left: 9px;
    font-size: 10px; font-weight: 800; color: #f4f6fb; opacity: .75;
  }
  .slide-label { font-weight: 800; line-height: 1.18; font-size: calc(var(--d) * 0.1); color: #f4f6fb; }

  /* Level 2 — child bubbles (text + image), clustered organically around
     the ACTIVE slide's fixed center via packChildrenAroundParent() (see
     SKILL.md Step 3), hidden until that slide expands. Every child is a
     true circle —
     never a rectangle card. Content is supposed to read as smaller
     bubbles blooming out of the parent, immersively, not a card popping
     up beside it — an earlier version anchored a rounded-rect panel to
     the bubble's edge and it still read as a disconnected modal in
     practice, however tightly it was anchored. Don't bring back a
     rectangle for content, ever, at any level. */
  .childcluster[hidden] { display: none; }

  /* Solid CHILD_CAT fill, not var(--surface-solid) — children need to
     visibly read as the LIGHT half of the parent-dark/child-light pair
     (see script), not a neutral page-coloured surface that happened to
     look plain white/grey regardless of the accent colour. Text is a
     fixed dark colour, not var(--text), because CHILD_CAT is always
     lightened toward white regardless of page mode, so dark text is what
     stays legible in both light and dark mode. */
  /* overflow-y: auto is a rare-case safety net (see TEXT_MAX_PARENT_FRAC
     in the script — sizing is meant to fit almost all paragraphs without
     ever needing it), NOT a visible scrolling affordance — this bubble
     gets no scrollbar-width/::-webkit-scrollbar override, so it inherits
     the sitewide hidden-scrollbar rule like everything else on the page.
     A visible scrollbar on a small circle read as broken, not readable. */
  .text-bubble {
    z-index: 46;
    background: var(--cat);
    border: 2px solid var(--cat);
    padding: 12px;
    font-size: 12px;
    line-height: 1.4;
    color: #1b1e26;
    overflow-y: auto;
    cursor: default;
  }

  /* Image children stay small thumbnails at rest; clicking one zooms it
     in place via `transform: scale()` (cheap, no reflow, and — unlike
     text — an image has no wrapped-content layout to fight, so animating
     its apparent size is safe here even though the base .bubble rule
     deliberately never animates width/height for text-bearing bubbles).
     The caption lives in a separate sibling label below it rather than
     inside the circle, so the image itself stays an uncluttered circle.
     Background is CHILD_CAT (visible behind any transparent PNG), same
     light-tint rule as .text-bubble. */
  .image-dot {
    z-index: 46;
    background: var(--cat);
    border: 2px solid var(--cat);
    overflow: hidden;
    transition: transform .4s var(--ease), box-shadow .3s ease, opacity .3s ease;
  }
  .image-dot img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .image-dot:hover { box-shadow: var(--shadow), 0 0 0 4px color-mix(in srgb, var(--cat) 25%, transparent); }
  .image-dot.expanded {
    transform: translate(-50%, -50%) scale(var(--zoom));
    z-index: 90;
    box-shadow: var(--shadow), 0 0 0 6px color-mix(in srgb, var(--cat) 25%, transparent);
  }

  .image-caption-label {
    position: absolute;
    left: var(--cx);
    /* IMAGE_EXPANDED_D/2 (100) + 8px gap below the zoomed-in circle —
       kept in sync with IMAGE_EXPANDED_D in the script. */
    top: calc(var(--cy) + 108px);
    transform: translateX(-50%);
    width: max-content;
    max-width: 200px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-soft);
    line-height: 1.3;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    z-index: 91;
  }
  .image-caption-label.visible { opacity: 1; }

  @media print {
    .settings-toggle, .settings-panel, .canvas-hint { display: none; }
    #canvas-wrap { overflow: visible; position: static; }
    body, #doc { overflow: visible; height: auto; }
  }
</style>
</head>
<body data-theme="blue" data-mode="dark">

  <button class="settings-toggle" id="settings-toggle" aria-label="Settings" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
    </svg>
  </button>

  <div class="settings-panel" id="settings-panel" hidden>
    <div>
      <div class="settings-label">Theme</div>
      <div class="theme-dots" id="theme-dots">
        <button class="theme-dot active" data-t="blue" title="Blue"></button>
        <button class="theme-dot" data-t="green" title="Green"></button>
        <button class="theme-dot" data-t="purple" title="Purple"></button>
        <button class="theme-dot" data-t="orange" title="Orange"></button>
        <button class="theme-dot" data-t="red" title="Red"></button>
      </div>
    </div>
    <button class="tool-btn" id="mode-toggle">☀️ Light</button>
    <button class="tool-btn primary" id="pdf-btn">⬇ Download PDF</button>
  </div>

  <div id="doc">

    <div class="doc-header">
      <div class="doc-eyebrow">Bubble Map</div>
      <h1 class="doc-title">{{BUBBLE_TITLE}}</h1>
      <p class="doc-subtitle">{{BUBBLE_SUBTITLE}}</p>
    </div>

    <div id="canvas-wrap">
      <div id="canvas"></div>
    </div>

    <p class="canvas-hint">scroll or drag to explore · click a bubble to expand</p>
    <div class="doc-footer">{{AUTHOR}}</div>

  </div>

  <script type="application/json" id="bubble-data">{{BUBBLE_DATA}}</script>

<script>
  (function () {
    var body = document.body;

    var settingsToggle = document.getElementById('settings-toggle');
    var settingsPanel = document.getElementById('settings-panel');
    settingsToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = settingsPanel.hidden;
      settingsPanel.hidden = !willOpen;
      settingsToggle.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!settingsPanel.hidden && !settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
        settingsPanel.hidden = true;
        settingsToggle.setAttribute('aria-expanded', 'false');
      }
    });

    var dots = document.querySelectorAll('.theme-dot');
    dots.forEach(function (dot) {
      dot.addEventListener('click', function () {
        body.setAttribute('data-theme', dot.getAttribute('data-t'));
        dots.forEach(function (d) { d.classList.remove('active'); });
        dot.classList.add('active');
      });
    });

    var modeBtn = document.getElementById('mode-toggle');
    modeBtn.addEventListener('click', function () {
      var isLight = body.getAttribute('data-mode') === 'light';
      body.setAttribute('data-mode', isLight ? 'dark' : 'light');
      modeBtn.textContent = isLight ? '☀️ Light' : '🌙 Dark';
    });

    var pdfBtn = document.getElementById('pdf-btn');
    pdfBtn.addEventListener('click', function () {
      var el = document.getElementById('canvas');
      var opt = {
        margin: 0.4,
        filename: '{{BUBBLE_TITLE}}.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(el).save();
    });

    // ---- Layout engine -------------------------------------------------------

    // Deterministic pseudo-random in [0,1) from an integer seed (mulberry32-
    // style hash). Used everywhere a bubble needs to look randomly placed —
    // NOT `Math.random()`, because this template's JS reruns on every page
    // load: a real-random seed would reshuffle the whole map (and every
    // slide's child cluster) on every reload, which reads as glitchy rather
    // than alive. A seeded hash gives the same "organic" arrangement every
    // time the same data is rendered.
    function seededRandom(seed) {
      var t = (seed + 0x6D2B79F5) | 0;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }

    // Colour encodes HIERARCHY (parent vs. child), not theme identity — a
    // single hue (the CURRENTLY SELECTED accent, the [data-theme] picker
    // in the chrome above), shaded darker for every slide bubble and
    // lighter for every child bubble. Both are `color-mix()` formulas
    // referencing `var(--accent)` rather than literal hex values, so
    // switching the theme picker (blue/green/purple/orange/red) re-tints
    // the whole map — nothing in the script needs to rebuild the DOM when
    // the picker changes, the browser just re-resolves the custom
    // property. Two earlier versions got the colour model wrong in
    // different ways: one used 8 unrelated hues (blue, green, orange...)
    // regardless of which accent was selected; the next fixed the hue but
    // still assigned a different SHADE per theme (so shade encoded theme
    // identity, needing a legend to explain it). Neither is right — the
    // shade axis is reserved for depth (parent darker, child lighter),
    // full stop. Don't reintroduce per-theme colour variation or a legend.
    function shade(t) {
      if (t === 0) return 'var(--accent)';
      if (t > 0) return 'color-mix(in srgb, var(--accent) ' + Math.round((1 - t) * 100) + '%, white ' + Math.round(t * 100) + '%)';
      return 'color-mix(in srgb, var(--accent) ' + Math.round((1 + t) * 100) + '%, black ' + Math.round(-t * 100) + '%)';
    }
    var PARENT_CAT = shade(-0.3);
    var CHILD_CAT = shade(0.42);

    // Slide bubbles are bigger than they might look like they need to be
    // at a glance — this headroom is what gives child bubbles enough
    // absolute room to hold real paragraph text at a fraction of the
    // parent's size (see TEXT_MAX_PARENT_FRAC below). A smaller range
    // here was tried and forced every child into a visible scrollbar
    // (see that note).
    var SLIDE_MIN_D = 110, SLIDE_MAX_D = 340, SLIDE_GAP = 12;
    // Text bubble diameter is content-based FIRST (same sqrt-of-length
    // sizing as everything else here — this is the range that actually
    // fits a typical few-sentence paragraph without scrolling), then
    // capped to TEXT_MAX_PARENT_FRAC of that specific parent's own
    // diameter so it can never reach or exceed its parent's size. Two
    // things had to change together to fix this, not just one: an
    // earlier version sized children as a FRACTION of the parent with no
    // content-based component (0.22–0.5 of the parent) — that guaranteed
    // "smaller than parent" but made children far too small to hold real
    // paragraph text, forcing a visible scrollbar on nearly every child.
    // Raising the cap fraction alone (without also raising SLIDE_MAX_D)
    // still wasn't enough — a 150-char paragraph needs roughly 200px+ of
    // diameter to lay out without scrolling regardless of what fraction
    // of the parent that happens to be, so the parent has to be big
    // enough that TEXT_MAX_PARENT_FRAC of it clears that floor. If body
    // paragraphs are kept short (see Step 1's character-count guidance),
    // the cap should rarely bite at all.
    var TEXT_MIN_D = 84, TEXT_MAX_D = 220, TEXT_MAX_PARENT_FRAC = 0.75, CHILD_GAP = 12;
    var IMAGE_MIN_D = 38, IMAGE_MAX_D = 92, IMAGE_FRAC = 0.28;
    var IMAGE_EXPANDED_D = 220, CHILD_PARENT_GAP = 20;
    // Generous enough that a child cluster blooming out around the largest
    // possible slide bubble still lands inside the canvas instead of
    // being clipped by its bounding box.
    var CANVAS_MARGIN = 60 + TEXT_MAX_D + CHILD_PARENT_GAP;
    var PACK_ITERATIONS = 400;

    // Force-relaxation circle packer: seed every slide bubble on a
    // randomly jittered cloud (deterministic, see seededRandom — NOT a
    // grid), then repeatedly (a) pull all of them a little toward their
    // shared centroid and (b) push apart any pair that overlaps. A grid
    // seed still converges to a valid non-overlapping packing, but it
    // visibly kept its row/column structure even after relaxation — the
    // pull-to-centroid force is uniform and gentle, so it closes gaps
    // without actually reshuffling who's next to whom, and the result
    // read as "sequentially spread out" rather than a native, organically
    // clustered blob. Seeding from a random cloud instead means there's
    // no underlying grid for the relaxation to preserve — the same family
    // of technique bubble-chart libraries use (a small physics sim),
    // simpler to hand-roll than true front-chain circle packing and
    // plenty accurate for a layout computed once at load. See SKILL.md
    // Step 3. Themes play no part in this positioning — sizing and
    // packing are per-slide, and themes have no colour role at all now
    // (see PARENT_CAT/CHILD_CAT above).
    function packCircles(items) {
      var n = items.length;
      if (n === 0) return items;
      var spread = (SLIDE_MAX_D + SLIDE_GAP) * Math.sqrt(n) * 0.55;
      items.forEach(function (it, i) {
        var a = seededRandom(i * 2 + 1) * Math.PI * 2;
        var rad = seededRandom(i * 2 + 2) * spread;
        it.x = Math.cos(a) * rad;
        it.y = Math.sin(a) * rad;
      });
      if (n === 1) return items;
      for (var iter = 0; iter < PACK_ITERATIONS; iter++) {
        var cx = 0, cy = 0;
        items.forEach(function (it) { cx += it.x; cy += it.y; });
        cx /= n; cy /= n;
        // Decay the pull to zero over the run so collision resolution gets
        // the final say — a constant-strength pull left a small chronic
        // overlap (the pull re-introducing it faster than one collision
        // sweep per iteration could clear), even after hundreds of iterations.
        var pull = 0.02 * (1 - iter / PACK_ITERATIONS);
        items.forEach(function (it) {
          it.x += (cx - it.x) * pull;
          it.y += (cy - it.y) * pull;
        });
        for (var i = 0; i < n; i++) {
          for (var j = i + 1; j < n; j++) {
            var a = items[i], b = items[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
            var minDist = a.r + b.r + SLIDE_GAP;
            if (dist < minDist) {
              var overlap = (minDist - dist) / 2;
              var ux = dx / dist, uy = dy / dist;
              a.x -= ux * overlap; a.y -= uy * overlap;
              b.x += ux * overlap; b.y += uy * overlap;
            }
          }
        }
      }
      return items;
    }

    // Clusters child circles ORGANICALLY around a fixed parent circle —
    // used per expanded slide to bloom its child bubbles (text + image)
    // around it. An earlier version placed every child on one perfectly
    // even ring (same radius, angles spaced by exactly 2π/n) — mathematically
    // collision-free, but it read as mechanical/"sequentially spread out"
    // rather than native bubbles nestling together. This instead seeds each
    // child at a random angle and a near-minimum distance from the parent
    // (deterministic, see seededRandom), then runs a short relaxation: pull
    // every child weakly toward the parent's center, re-clamp it to just
    // outside the parent's surface if that pull put it inside, and resolve
    // pairwise overlaps between children. The net effect is children settling
    // at varying distances and angles — some hugging the parent directly,
    // others nested a little further out behind a sibling — the way real
    // bubbles cluster against a larger one, not one uniform halo.
    function packChildrenAroundParent(parentX, parentY, parentR, children, gap, seedBase) {
      var n = children.length;
      if (n === 0) return children;
      children.forEach(function (c, i) {
        var a = seededRandom(seedBase + i * 2 + 1) * Math.PI * 2;
        var rad = parentR + c.r + gap + seededRandom(seedBase + i * 2 + 2) * c.r;
        c.x = parentX + Math.cos(a) * rad;
        c.y = parentY + Math.sin(a) * rad;
      });
      var iterations = 160;
      for (var iter = 0; iter < iterations; iter++) {
        var pull = 0.05 * (1 - (iter / iterations) * 0.6);
        children.forEach(function (c) {
          c.x += (parentX - c.x) * pull;
          c.y += (parentY - c.y) * pull;
          var dx = c.x - parentX, dy = c.y - parentY;
          var dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
          var minDist = parentR + c.r + gap;
          if (dist < minDist) {
            var ux = dx / dist, uy = dy / dist;
            c.x = parentX + ux * minDist;
            c.y = parentY + uy * minDist;
          }
        });
        for (var i = 0; i < n; i++) {
          for (var j = i + 1; j < n; j++) {
            var a = children[i], b = children[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
            var minDist = a.r + b.r + gap;
            if (dist < minDist) {
              var overlap = (minDist - dist) / 2;
              var ux = dx / dist, uy = dy / dist;
              a.x -= ux * overlap; a.y -= uy * overlap;
              b.x += ux * overlap; b.y += uy * overlap;
            }
          }
        }
      }
      return children;
    }

    function el(tag, className) {
      var e = document.createElement(tag);
      if (className) e.className = className;
      return e;
    }

    function setGeometry(node, cx, cy, d) {
      node.style.setProperty('--cx', cx + 'px');
      node.style.setProperty('--cy', cy + 'px');
      node.style.setProperty('--d', d + 'px');
    }

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str == null ? '' : String(str);
      return d.innerHTML;
    }

    // ---- Interaction state --------------------------------------------------

    var allSlideEls = [];
    var expandedSlide = null;
    var RELAX_ITERATIONS = 200;

    function collapseImages(slide) {
      (slide.imagePairs || []).forEach(function (p) {
        p.dot.classList.remove('expanded');
        p.label.classList.remove('visible');
      });
    }

    // Moves every slide bubble back to its resting (packed) position —
    // the mirror image of relaxNeighbors() below.
    function resetPositions() {
      allSlideEls.forEach(function (s) {
        s.x = s.baseX; s.y = s.baseY;
        setGeometry(s.bubbleEl, s.x, s.y, s.d);
      });
    }

    // Clears free space around `active` by nudging every OTHER slide
    // bubble outside its footprint circle (own radius + however far its
    // child ring blooms out, see footprintR at build time) — so an
    // expanded cluster never sits on top of a neighbor, it displaces it.
    // `active` itself never moves; it's the fixed anchor everything else
    // clears away from. This is a one-shot relaxation (obstacle push +
    // pairwise collision + a weak pull back toward each bubble's own
    // resting spot), computed once per click, not a live physics loop —
    // the CSS spring easing on left/top (see .slide-bubble) is what
    // supplies the organic, slightly overshooting settle, not per-frame
    // simulation. Same family of technique as packCircles(), just
    // relative to a fixed obstacle instead of a shared centroid.
    function relaxNeighbors(active) {
      var others = allSlideEls.filter(function (s) { return s !== active; });
      var cx = active.baseX, cy = active.baseY, footR = active.footprintR;

      function pushOutsideFootprint(s) {
        var dx = s.x - cx, dy = s.y - cy;
        var dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        var minDist = footR + s.d / 2 + SLIDE_GAP;
        if (dist < minDist) {
          var ux = dx / dist, uy = dy / dist;
          s.x = cx + ux * minDist;
          s.y = cy + uy * minDist;
        }
      }

      others.forEach(function (s) { s.x = s.baseX; s.y = s.baseY; pushOutsideFootprint(s); });

      for (var iter = 0; iter < RELAX_ITERATIONS; iter++) {
        var pull = 0.03 * (1 - iter / RELAX_ITERATIONS);
        others.forEach(function (s) {
          s.x += (s.baseX - s.x) * pull;
          s.y += (s.baseY - s.y) * pull;
        });
        for (var i = 0; i < others.length; i++) {
          for (var j = i + 1; j < others.length; j++) {
            var a = others[i], b = others[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
            var minDist = a.d / 2 + b.d / 2 + SLIDE_GAP;
            if (dist < minDist) {
              var overlap = (minDist - dist) / 2;
              var ux = dx / dist, uy = dy / dist;
              a.x -= ux * overlap; a.y -= uy * overlap;
              b.x += ux * overlap; b.y += uy * overlap;
            }
          }
        }
        others.forEach(pushOutsideFootprint);
      }

      others.forEach(function (s) { setGeometry(s.bubbleEl, s.x, s.y, s.d); });
    }

    function collapseAll() {
      allSlideEls.forEach(function (s) {
        s.bubbleEl.classList.remove('active', 'dimmed');
        collapseImages(s);
        if (s.childClusterEl) s.childClusterEl.hidden = true;
      });
      resetPositions();
      expandedSlide = null;
    }

    // No panel to expand here — the slide's own bubble already shows its
    // heading. Selecting a slide reveals its pre-positioned child ring
    // (text + image bubbles), dims every other slide bubble, and clears
    // free space around itself by nudging any bubble in the way outward.
    function selectSlide(slide) {
      var reopening = expandedSlide === slide;
      collapseAll();
      if (reopening) return;

      slide.bubbleEl.classList.add('active');
      allSlideEls.forEach(function (s) { if (s !== slide) s.bubbleEl.classList.add('dimmed'); });
      if (slide.childClusterEl) slide.childClusterEl.hidden = false;
      relaxNeighbors(slide);
      expandedSlide = slide;
    }

    // Image children zoom in place (transform: scale on the dot itself,
    // see CSS) rather than opening a separate panel — there's no card to
    // toggle, just the circle growing and its caption label fading in.
    function selectImage(imgPair, slide) {
      var reopening = imgPair.dot.classList.contains('expanded');
      (slide.imagePairs || []).forEach(function (p) {
        p.dot.classList.remove('expanded');
        p.label.classList.remove('visible');
      });
      if (reopening) return;
      imgPair.dot.classList.add('expanded');
      imgPair.label.classList.add('visible');
    }

    // ---- Build ---------------------------------------------------------------

    function layoutBubbles(data) {
      var canvas = document.getElementById('canvas');
      var themes = data.themes || [];
      if (themes.length === 0) return;

      // Flatten themes -> slides. Every slide is laid out as an
      // independent, equally first-class bubble alongside every other
      // slide in the deck — themes drive neither position, size, nor
      // colour; they exist purely to organize the input JSON.
      var slides = [];
      themes.forEach(function (theme) {
        theme.slides.forEach(function (slide) { slides.push(slide); });
      });
      if (slides.length === 0) return;

      // Size each bubble by how much content it carries (body length +
      // image count), area-proportional like every other renderer's
      // count-driven sizing — a slide with ~4x the weight of another gets
      // ~2x the diameter, not 4x, so relative size reads at a glance
      // without one slide swallowing the whole canvas.
      var weights = slides.map(function (slide) {
        var bodyLen = (slide.body || []).join(' ').length;
        return 1 + bodyLen / 220 + (slide.images || []).length * 1.4;
      });
      var maxWeight = Math.max.apply(null, weights);

      var items = slides.map(function (slide, i) {
        var d = SLIDE_MIN_D + (SLIDE_MAX_D - SLIDE_MIN_D) * Math.sqrt(weights[i] / maxWeight);
        return { slide: slide, r: d / 2 };
      });

      packCircles(items);

      // Bounding box of the packed cluster -> canvas size, then shift every
      // circle so the whole cluster sits inside positive canvas coordinates.
      var minX = Math.min.apply(null, items.map(function (it) { return it.x - it.r; }));
      var maxX = Math.max.apply(null, items.map(function (it) { return it.x + it.r; }));
      var minY = Math.min.apply(null, items.map(function (it) { return it.y - it.r; }));
      var maxY = Math.max.apply(null, items.map(function (it) { return it.y + it.r; }));
      var offsetX = CANVAS_MARGIN - minX;
      var offsetY = CANVAS_MARGIN - minY;
      var canvasW = (maxX - minX) + CANVAS_MARGIN * 2;
      var canvasH = (maxY - minY) + CANVAS_MARGIN * 2;
      canvas.style.width = canvasW + 'px';
      canvas.style.height = canvasH + 'px';

      items.forEach(function (item, slideIdx) {
        item.x += offsetX;
        item.y += offsetY;

        var slideData = item.slide;
        var d = item.r * 2;

        var shortLabel = (slideData.heading || '').split(/\s+/).slice(0, 6).join(' ');
        var bubbleEl = el('div', 'bubble slide-bubble');
        bubbleEl.style.setProperty('--cat', PARENT_CAT);
        setGeometry(bubbleEl, item.x, item.y, d);
        bubbleEl.innerHTML =
          (slideData.index != null ? '<div class="slide-index">' + slideData.index + '</div>' : '') +
          '<div class="slide-label">' + escapeHtml(shortLabel) + '</div>';
        canvas.appendChild(bubbleEl);

        // baseX/baseY is this bubble's packed resting position (never
        // changes); x/y is its current, possibly-relaxed position —
        // resetPositions()/relaxNeighbors() read and write x/y, always
        // relative back to baseX/baseY. footprintR defaults to just this
        // bubble's own radius (no bloom to clear space for) and is
        // widened below once its child ring's extent is known.
        var slideEntry = {
          bubbleEl: bubbleEl, childClusterEl: null, imagePairs: [],
          baseX: item.x, baseY: item.y, x: item.x, y: item.y, d: d, footprintR: item.r
        };
        allSlideEls.push(slideEntry);
        bubbleEl.addEventListener('click', function (e) {
          e.stopPropagation();
          selectSlide(slideEntry);
        });

        // Child bubbles: one true circle per body paragraph (text) plus
        // one per image (thumbnail), clustered organically around this
        // slide's fixed center (see packChildrenAroundParent), hidden
        // until the slide expands. Sized by each child's own content — a
        // long paragraph gets a bigger circle than a short one, same
        // area-proportional convention as every other bubble here.
        var bodyParagraphs = slideData.body || [];
        var images = slideData.images || [];
        if (bodyParagraphs.length + images.length > 0) {
          var childCluster = el('div', 'childcluster');
          childCluster.hidden = true;
          canvas.appendChild(childCluster);
          childCluster.addEventListener('click', function (e) { e.stopPropagation(); });
          slideEntry.childClusterEl = childCluster;

          // Text bubbles: content-based size first (fits the paragraph),
          // then capped to TEXT_MAX_PARENT_FRAC of THIS parent's own `d`
          // so it always reads as visibly smaller than its parent — see
          // the constants above for why it's content-based-then-capped,
          // not fraction-only.
          var maxLen = Math.max.apply(null, bodyParagraphs.map(function (p) { return p.length; }).concat([1]));
          var children = bodyParagraphs.map(function (p) {
            var contentD = TEXT_MIN_D + (TEXT_MAX_D - TEXT_MIN_D) * Math.sqrt(p.length / maxLen);
            var dd = Math.min(contentD, d * TEXT_MAX_PARENT_FRAC);
            return { kind: 'text', text: p, r: dd / 2 };
          }).concat(images.map(function (image) {
            var imgD = Math.max(IMAGE_MIN_D, Math.min(IMAGE_MAX_D, d * IMAGE_FRAC));
            return { kind: 'image', image: image, r: imgD / 2 };
          }));

          packChildrenAroundParent(item.x, item.y, item.r, children, CHILD_GAP, (slideIdx + 1) * 1000);

          var maxExtent = Math.max.apply(null, children.map(function (c) {
            return Math.hypot(c.x - item.x, c.y - item.y) + c.r;
          }));
          slideEntry.footprintR = maxExtent + 6;

          children.forEach(function (child) {
            var ccx = child.x, ccy = child.y;
            var cd = child.r * 2;

            if (child.kind === 'text') {
              var textEl = el('div', 'bubble text-bubble');
              textEl.style.setProperty('--cat', CHILD_CAT);
              setGeometry(textEl, ccx, ccy, cd);
              textEl.textContent = child.text;
              childCluster.appendChild(textEl);
            } else {
              var dotEl = el('div', 'bubble image-dot');
              dotEl.style.setProperty('--cat', CHILD_CAT);
              setGeometry(dotEl, ccx, ccy, cd);
              dotEl.style.setProperty('--zoom', (IMAGE_EXPANDED_D / cd).toFixed(3));
              dotEl.innerHTML = '<img src="' + child.image.src + '" alt="">';
              childCluster.appendChild(dotEl);

              var labelEl = el('div', 'image-caption-label');
              setGeometry(labelEl, ccx, ccy, cd);
              labelEl.textContent = child.image.caption || '';
              childCluster.appendChild(labelEl);

              var imgPair = { dot: dotEl, label: labelEl };
              slideEntry.imagePairs.push(imgPair);
              dotEl.addEventListener('click', function (e) {
                e.stopPropagation();
                selectImage(imgPair, slideEntry);
              });
            }
          });
        }
      });

      // Center the initial scroll position on the whole map.
      var wrap = document.getElementById('canvas-wrap');
      wrap.scrollLeft = (canvasW - wrap.clientWidth) / 2;
      wrap.scrollTop = (canvasH - wrap.clientHeight) / 2;
    }

    var raw = document.getElementById('bubble-data').textContent;
    layoutBubbles(JSON.parse(raw));

    document.getElementById('canvas-wrap').addEventListener('click', function (e) {
      if (e.target.id === 'canvas-wrap' || e.target.id === 'canvas') collapseAll();
    });

    // Click-and-drag panning, free in both axes from ANY starting point —
    // including on top of a bubble. An earlier version bailed out of
    // starting a pan whenever the mousedown target was inside a `.bubble`
    // (to leave room for bubbles' own click-to-select), which worked back
    // when bubbles were small with visible gaps between them. Once bubbles
    // got bigger and packed edge-to-edge (see Step 3), there was often no
    // bare canvas background left to grab at all — nearly every mousedown
    // landed on a bubble, panning simply couldn't start, and what the
    // pointer did instead was fire that bubble's ordinary click (select/
    // dim), over and over, for every bubble the pointer happened to land
    // on. That's the "just keeps highlighting each object instead of
    // moving through the space" bug. The fix is to always start tracking
    // on mousedown regardless of target, then decide AFTER the fact, using
    // DRAG_THRESHOLD px of movement, whether this was a drag (pan) or a
    // click (select) — and if it was a drag, swallow the click event that
    // would otherwise still fire on mouseup so whatever's under the
    // pointer (a bubble, or the canvas background's own collapseAll
    // listener above) doesn't also react to what was really a pan.
    (function enableDragPan() {
      var wrap = document.getElementById('canvas-wrap');
      var DRAG_THRESHOLD = 6;
      var isDown = false, dragging = false, startX, startY, startLeft, startTop;

      wrap.addEventListener('mousedown', function (e) {
        isDown = true;
        dragging = false;
        startX = e.pageX; startY = e.pageY;
        startLeft = wrap.scrollLeft; startTop = wrap.scrollTop;
      });

      window.addEventListener('mousemove', function (e) {
        if (!isDown) return;
        var dx = e.pageX - startX, dy = e.pageY - startY;
        if (!dragging && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
          dragging = true;
          wrap.classList.add('dragging');
        }
        if (dragging) {
          e.preventDefault();
          wrap.scrollLeft = startLeft - dx;
          wrap.scrollTop = startTop - dy;
        }
      });

      window.addEventListener('mouseup', function () {
        isDown = false;
        wrap.classList.remove('dragging');
        // Fallback reset in case no click event follows this mouseup (e.g.
        // the pointer was released outside #canvas-wrap) — the capturing
        // click listener below normally consumes `dragging` first, since
        // click dispatch happens synchronously before this timeout runs.
        if (dragging) setTimeout(function () { dragging = false; }, 0);
      });

      // Registered on `document`, not `wrap` — a capture-phase listener on
      // a genuine ANCESTOR of every click target (bubbles, #canvas-wrap
      // itself) is guaranteed to run before ALL of their listeners,
      // regardless of registration order. A capture listener placed on
      // `wrap` itself would only reliably beat DESCENDANTS (bubbles); it
      // wouldn't reliably beat wrap's OWN collapseAll listener above,
      // since same-element listeners fire in registration order. This is
      // what makes the suppression cover every click target uniformly.
      document.addEventListener('click', function (e) {
        if (dragging) {
          e.stopPropagation();
          e.preventDefault();
          dragging = false;
        }
      }, true);
    })();
  })();
</script>

</body>
</html>

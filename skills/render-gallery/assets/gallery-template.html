<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{GALLERY_TITLE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #1c1c1f;
    --surface: rgba(255,255,255,0.05);
    --surface-solid: #242327;
    --surface-alt: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.12);
    --text: #eef1f8;
    --text-soft: #aab2c5;
    --text-faint: #6e7690;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.16);
    --accent-glow: rgba(91,140,255,0.55);
    --accent-dark: #3a63d4;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --blur: 18px;
  }

  [data-theme="blue"]   { --accent: #5b8cff; --accent-soft: rgba(91,140,255,0.16); --accent-glow: rgba(91,140,255,0.55); --accent-dark: #3a63d4; }
  [data-theme="green"]  { --accent: #3fd690; --accent-soft: rgba(63,214,144,0.16); --accent-glow: rgba(63,214,144,0.55); --accent-dark: #1f9c64; }
  [data-theme="purple"] { --accent: #a684ff; --accent-soft: rgba(166,132,255,0.16); --accent-glow: rgba(166,132,255,0.55); --accent-dark: #7c54e0; }
  [data-theme="orange"] { --accent: #ff9d4d; --accent-soft: rgba(255,157,77,0.16); --accent-glow: rgba(255,157,77,0.55); --accent-dark: #e07820; }
  [data-theme="red"]    { --accent: #ef4444; --accent-soft: rgba(239,68,68,0.16); --accent-glow: rgba(239,68,68,0.55); --accent-dark: #c62828; }

  body[data-mode="light"] {
    --bg: #f6f1e8;
    --surface: rgba(255,255,255,0.7);
    --surface-solid: #ffffff;
    --surface-alt: rgba(20,23,31,0.04);
    --border: rgba(20,23,31,0.1);
    --text: #181a20;
    --text-soft: #565d6e;
    --text-faint: #8990a3;
    --shadow: 0 8px 28px rgba(20,30,60,0.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* Hide scrollbars everywhere — scrolling still works, just no visible track/thumb.
     Part of the shared chrome; keep this block in every template. */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background-color .25s ease, color .25s ease;
    min-height: 100vh;
  }

  .settings-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .settings-toggle:hover { border-color: var(--accent-glow); transform: translateY(-1px); }
  .settings-toggle svg { width: 18px; height: 18px; }

  .settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 100;
    width: 224px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .settings-panel[hidden] { display: none; }

  .settings-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  /* Theme dropdown — replaces the old row of clickable colour dots. The
     trigger's own text sits in var(--accent), so it re-colours for free
     whenever data-theme changes (no JS needed for that part); the menu
     stays a plain toggle+outside-click pattern, same as .settings-panel's
     own open/close. */
  .theme-select { position: relative; }
  .theme-select-trigger {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    width: 100%;
    font-size: 13px; font-weight: 700;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--accent);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease, color .2s ease;
  }
  .theme-select-trigger:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .theme-select-trigger::after { content: "\25be"; font-size: 11px; opacity: .7; }
  .theme-select-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 10;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .theme-select-menu[hidden] { display: none; }
  .theme-select-option {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 7px 10px; border-radius: 8px;
    border: none;
    background: none;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: background .15s ease;
  }
  .theme-select-option:hover { background: var(--surface-alt); }
  .theme-select-option.active { color: var(--accent); font-weight: 800; }
  .theme-select-option::before { content: ""; width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .theme-select-option[data-t="blue"]::before   { background: #5b8cff; }
  .theme-select-option[data-t="green"]::before  { background: #3fd690; }
  .theme-select-option[data-t="purple"]::before { background: #a684ff; }
  .theme-select-option[data-t="orange"]::before { background: #ff9d4d; }
  .theme-select-option[data-t="red"]::before    { background: #ef4444; }

  .settings-panel button.tool-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .settings-panel button.tool-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .settings-panel button.tool-btn.primary {
    background: var(--accent); color: #0a0c12; border-color: var(--accent);
    box-shadow: 0 0 18px var(--accent-glow);
  }
  .settings-panel button.tool-btn.primary:hover { background: var(--accent-dark); }

  /* PDF download disabled for now — kept in the DOM/wiring as-is, just
     visually and functionally inert. */
  #pdf-btn { opacity: 0.4; pointer-events: none; cursor: not-allowed; }

  /* Dark/light switch — an iOS-style sliding pill instead of a plain text
     button, so toggling reads as one continuous motion (thumb slides,
     sun/moon cross-fade+rotate into each other) rather than an instant
     swap. Label text keeps the original button's semantics: it names the
     action a click performs, not the current state — aria-pressed carries
     the actual state for assistive tech. */
  .mode-toggle {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .mode-toggle:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .mode-toggle-switch {
    position: relative;
    flex: none;
    width: 38px; height: 22px;
    border-radius: 999px;
    background: var(--border);
    transition: background .35s ease;
  }
  body[data-mode="dark"] .mode-toggle-switch { background: var(--accent-dark); }
  .mode-toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface-solid);
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
  }
  body[data-mode="dark"] .mode-toggle-thumb { transform: translateX(16px); }
  .mode-toggle-thumb svg {
    position: absolute;
    width: 12px; height: 12px;
    transition: opacity .3s ease, transform .4s ease;
  }
  .mode-toggle-thumb .icon-sun { color: #e8a63c; opacity: 1; transform: rotate(0deg) scale(1); }
  .mode-toggle-thumb .icon-moon { color: #7c93c9; opacity: 0; transform: rotate(-90deg) scale(.5); }
  body[data-mode="dark"] .mode-toggle-thumb .icon-sun { opacity: 0; transform: rotate(90deg) scale(.5); }
  body[data-mode="dark"] .mode-toggle-thumb .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

  /* Small "?" affordance pinned immediately left of the settings cog —
     same visual style/size as .settings-toggle. Opens a dismissible
     tooltip with the interaction hint instead of permanent on-page text. */
  .help-toggle {
    position: fixed;
    top: 20px;
    right: 72px;
    z-index: 100;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text);
    font-size: 16px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .help-toggle:hover { border-color: var(--accent-glow); transform: translateY(-1px); }
  .help-tooltip {
    position: fixed;
    top: 70px;
    right: 72px;
    z-index: 100;
    width: 208px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 14px;
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--text-soft);
  }
  .help-tooltip[hidden] { display: none; }

  #doc {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 100px;
  }

  .doc-header { margin-bottom: 28px; text-align: left; }
  .doc-eyebrow {
    display: inline-block;
    font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid var(--accent-glow);
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .doc-title {
    font-size: clamp(28px, 4vw, 42px); font-weight: 800; margin: 0 0 10px; line-height: 1.15;
    letter-spacing: -.01em;
  }
  .doc-subtitle { font-size: 16px; color: var(--text-soft); margin: 0; line-height: 1.5; max-width: 640px; }
  .doc-meta { font-size: 12px; color: var(--text-faint); margin: 10px 0 0; }

  /* Masonry grid — CSS columns, not CSS grid. Varied card heights are the point. */
  #grid {
    column-count: 4;
    column-gap: 18px;
  }
  @media (max-width: 1100px) { #grid { column-count: 3; } }
  @media (max-width: 780px)  { #grid { column-count: 2; } }
  @media (max-width: 480px)  { #grid { column-count: 1; } }

  .card {
    break-inside: avoid;
    margin-bottom: 18px;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: var(--surface-solid);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow), 0 0 0 1px var(--accent-soft); }

  .card-image-wrap { position: relative; }
  .card-image { display: block; width: 100%; }
  .card-title {
    padding: 12px 16px 16px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }

  .card-solid {
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--accent);
  }
  .card-heading-solid {
    color: #fff;
    font-weight: 700;
    font-size: 19px;
    text-align: center;
    line-height: 1.3;
  }

  /* Detail overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6,7,10,0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 24px;
  }
  .overlay[hidden] { display: none; }

  .panel {
    display: flex;
    max-width: 960px;
    width: 100%;
    max-height: calc(100vh - 80px);
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow), 0 0 0 1px var(--accent-soft);
  }
  .panel-media { flex: 1 1 45%; min-width: 0; background: var(--accent); display: flex; align-items: center; justify-content: center; }
  .panel-media img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .panel-content { flex: 1 1 55%; padding: 32px 34px; overflow-y: auto; }
  /* This box can legitimately have more content below the fold — unlike the
     page-level scroll (hidden everywhere else in the shared chrome), this one
     needs a visible cue or the truncation reads as a bug. Override the global
     hide-scrollbar rule just for this element. */
  .panel-content { scrollbar-width: thin; scrollbar-color: var(--accent-glow) transparent; }
  .panel-content::-webkit-scrollbar { display: block; width: 5px; }
  .panel-content::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 6px; }
  .panel-content h2 { margin: 0 0 18px; font-size: 24px; font-weight: 800; }
  .panel-body-list { margin: 0 0 18px; padding-left: 20px; }
  .panel-body-list li { font-size: 16px; line-height: 1.6; color: var(--text); margin-bottom: 8px; }
  .panel-caption {
    font-size: 13px; font-style: italic; color: var(--text-faint);
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  @media (max-width: 680px) {
    .panel { flex-direction: column; max-height: calc(100vh - 48px); overflow-y: auto; }
    .panel-media { flex: 0 0 auto; aspect-ratio: 16 / 9; }
    .panel { scrollbar-width: thin; scrollbar-color: var(--accent-glow) transparent; }
    .panel::-webkit-scrollbar { display: block; width: 5px; }
    .panel::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 6px; }
  }

  @media print {
    .settings-toggle, .settings-panel, .help-toggle, .help-tooltip { display: none; }
  }
</style>
</head>
<body data-theme="blue" data-mode="light">

  <button class="settings-toggle" id="settings-toggle" aria-label="Settings" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
    </svg>
  </button>

  <button class="help-toggle" id="help-toggle" aria-label="Help" aria-expanded="false">?</button>
  <div class="help-tooltip" id="help-tooltip" hidden>click a card to view details</div>

  <div class="settings-panel" id="settings-panel" hidden>
    <div class="theme-select" id="theme-select">
      <div class="settings-label">Theme</div>
      <button class="theme-select-trigger" id="theme-select-trigger" aria-haspopup="listbox" aria-expanded="false">Change Theme</button>
      <div class="theme-select-menu" id="theme-select-menu" hidden role="listbox">
        <button class="theme-select-option active" data-t="blue" role="option" aria-selected="true">Blue</button>
        <button class="theme-select-option" data-t="green" role="option" aria-selected="false">Green</button>
        <button class="theme-select-option" data-t="purple" role="option" aria-selected="false">Purple</button>
        <button class="theme-select-option" data-t="orange" role="option" aria-selected="false">Orange</button>
        <button class="theme-select-option" data-t="red" role="option" aria-selected="false">Red</button>
      </div>
    </div>
    <button class="mode-toggle" id="mode-toggle" aria-pressed="false">
      <span id="mode-toggle-label">Dark</span>
      <span class="mode-toggle-switch" aria-hidden="true">
        <span class="mode-toggle-thumb">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </span>
      </span>
    </button>
    <button class="tool-btn primary" id="pdf-btn">⬇ Download PDF</button>
  </div>

  <div id="doc">

    <div class="doc-header">
      <div class="doc-eyebrow">Gallery</div>
      <h1 class="doc-title">{{GALLERY_TITLE}}</h1>
      <p class="doc-subtitle">{{GALLERY_SUBTITLE}}</p>
      <p class="doc-meta">{{AUTHOR}}</p>
    </div>

    <div id="grid">

      <!-- CARD BLOCK: IMAGE VARIANT — duplicate for each slide that has an image.
           Both <img> src attributes (card face + card-detail) must be the exact
           token __IMAGE_SLIDE_<n>__ for that slide's number. Do not fill in a real URL. -->
      <div class="card" data-index="1">
        <div class="card-face">
          <div class="card-image-wrap">
            <img class="card-image" src="__IMAGE_SLIDE_1__" alt="{{CARD_1_HEADING}}">
          </div>
          <div class="card-title">{{CARD_1_HEADING}}</div>
        </div>
        <div class="card-detail" hidden>
          <div class="panel-media"><img src="__IMAGE_SLIDE_1__" alt="{{CARD_1_HEADING}}"></div>
          <div class="panel-content">
            <h2>{{CARD_1_HEADING}}</h2>
            <ul class="panel-body-list">
              <li>{{CARD_1_BODY_1}}</li>
            </ul>
            <p class="panel-caption">{{CARD_1_CAPTION}}</p>
          </div>
        </div>
      </div>
      <!-- END CARD BLOCK: IMAGE VARIANT -->

      <!-- CARD BLOCK: SOLID VARIANT — duplicate for each slide with no image. -->
      <div class="card" data-index="2">
        <div class="card-face card-solid">
          <div class="card-heading-solid">{{CARD_2_HEADING}}</div>
        </div>
        <div class="card-detail" hidden>
          <div class="panel-media"><div class="card-heading-solid">{{CARD_2_HEADING}}</div></div>
          <div class="panel-content">
            <h2>{{CARD_2_HEADING}}</h2>
            <ul class="panel-body-list">
              <li>{{CARD_2_BODY_1}}</li>
            </ul>
          </div>
        </div>
      </div>
      <!-- END CARD BLOCK: SOLID VARIANT -->

    </div>

  </div>

  <div class="overlay" id="overlay" hidden>
    <div class="panel" id="panel"></div>
  </div>

<script>
  (function () {
    var body = document.body;

    var settingsToggle = document.getElementById('settings-toggle');
    var settingsPanel = document.getElementById('settings-panel');
    settingsToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = settingsPanel.hidden;
      settingsPanel.hidden = !willOpen;
      settingsToggle.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!settingsPanel.hidden && !settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
        settingsPanel.hidden = true;
        settingsToggle.setAttribute('aria-expanded', 'false');
      }
    });

    var helpToggle = document.getElementById('help-toggle');
    var helpTooltip = document.getElementById('help-tooltip');
    helpToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = helpTooltip.hidden;
      helpTooltip.hidden = !willOpen;
      helpToggle.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!helpTooltip.hidden && !helpTooltip.contains(e.target) && !helpToggle.contains(e.target)) {
        helpTooltip.hidden = true;
        helpToggle.setAttribute('aria-expanded', 'false');
      }
    });

    var themeTrigger = document.getElementById('theme-select-trigger');
    var themeMenu = document.getElementById('theme-select-menu');
    var themeOptions = document.querySelectorAll('.theme-select-option');
    themeTrigger.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = themeMenu.hidden;
      themeMenu.hidden = !willOpen;
      themeTrigger.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!themeMenu.hidden && !themeMenu.contains(e.target) && !themeTrigger.contains(e.target)) {
        themeMenu.hidden = true;
        themeTrigger.setAttribute('aria-expanded', 'false');
      }
    });
    themeOptions.forEach(function (opt) {
      opt.addEventListener('click', function () {
        body.setAttribute('data-theme', opt.getAttribute('data-t'));
        themeOptions.forEach(function (o) {
          o.classList.remove('active');
          o.setAttribute('aria-selected', 'false');
        });
        opt.classList.add('active');
        opt.setAttribute('aria-selected', 'true');
        themeMenu.hidden = true;
        themeTrigger.setAttribute('aria-expanded', 'false');
      });
    });

    var modeBtn = document.getElementById('mode-toggle');
    var modeLabel = document.getElementById('mode-toggle-label');
    modeBtn.addEventListener('click', function () {
      var isLight = body.getAttribute('data-mode') === 'light';
      var newMode = isLight ? 'dark' : 'light';
      body.setAttribute('data-mode', newMode);
      modeBtn.setAttribute('aria-pressed', String(newMode === 'dark'));
      modeLabel.textContent = isLight ? 'Light' : 'Dark';
    });

    var pdfBtn = document.getElementById('pdf-btn');
    pdfBtn.addEventListener('click', function () {
      var el = document.getElementById('grid');
      var opt = {
        margin: 0.4,
        filename: '{{GALLERY_TITLE}}.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(el).save();
    });

    var overlay = document.getElementById('overlay');
    var panel = document.getElementById('panel');
    var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));

    cards.forEach(function (card) {
      card.addEventListener('click', function () {
        var detail = card.querySelector('.card-detail');
        if (!detail) return;
        panel.innerHTML = '';
        Array.prototype.slice.call(detail.children).forEach(function (child) {
          var clone = child.cloneNode(true);
          clone.hidden = false;
          panel.appendChild(clone);
        });
        overlay.hidden = false;
      });
    });

    overlay.addEventListener('click', function (event) {
      if (event.target === overlay) {
        overlay.hidden = true;
        panel.innerHTML = '';
      }
    });
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TIMELINE_TITLE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface-alt: #f1f3f6;
    --border: #e3e6ea;
    --text: #1c2024;
    --text-soft: #5a6270;
    --text-faint: #8a90a0;
    --accent: #2b5be0;
    --accent-soft: #e8edfc;
    --accent-dark: #1a3fa0;
    --accent-dark-soft: #142d73;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(20,20,30,0.04), 0 4px 16px rgba(20,20,30,0.06);
  }

  [data-theme="blue"]   { --accent: #2b5be0; --accent-soft: #e8edfc; --accent-dark: #1a3fa0; --accent-dark-soft: #142d73; }
  [data-theme="green"]  { --accent: #1a7a4a; --accent-soft: #e3f5ea; --accent-dark: #11532f; --accent-dark-soft: #0c3a21; }
  [data-theme="purple"] { --accent: #7c5cbf; --accent-soft: #efe9fb; --accent-dark: #56408a; --accent-dark-soft: #3c2d62; }
  [data-theme="orange"] { --accent: #b5650a; --accent-soft: #fbeede; --accent-dark: #804608; --accent-dark-soft: #5c3306; }
  [data-theme="pink"]   { --accent: #c2447a; --accent-soft: #fbe7ef; --accent-dark: #8a3057; --accent-dark-soft: #61213d; }

  body[data-mode="dark"] {
    --bg: #15171c;
    --surface: #1d2026;
    --surface-alt: #242832;
    --border: #2d313b;
    --text: #eceef2;
    --text-soft: #aab0bc;
    --text-faint: #777e8c;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background .2s ease, color .2s ease;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .theme-dots { display: flex; gap: 6px; margin-right: 8px; }
  .theme-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
  }
  .theme-dot[data-t="blue"]   { background: #2b5be0; }
  .theme-dot[data-t="green"]  { background: #1a7a4a; }
  .theme-dot[data-t="purple"] { background: #7c5cbf; }
  .theme-dot[data-t="orange"] { background: #b5650a; }
  .theme-dot[data-t="pink"]   { background: #c2447a; }
  .theme-dot.active { border-color: var(--text); }

  .toolbar button.tool-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
  }
  .toolbar button.tool-btn:hover { background: var(--accent-soft); }
  .toolbar button.tool-btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .toolbar button.tool-btn.primary:hover { background: var(--accent-dark); }

  #doc {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .doc-header { margin-bottom: 36px; }
  .doc-eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--accent);
  }
  .doc-title { font-size: 30px; font-weight: 800; margin: 6px 0 8px; line-height: 1.2; }
  .doc-subtitle { font-size: 15px; color: var(--text-soft); margin: 0 0 10px; line-height: 1.5; }
  .doc-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--text-faint); }

  /* Timeline rail */
  .timeline-wrap {
    position: relative;
    overflow-x: auto;
    overflow-y: visible;
    padding: 60px 20px 30px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .timeline-rail {
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 56px;
    min-width: max-content;
  }
  .timeline-rail::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 22px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }

  .node {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 160px;
    flex-shrink: 0;
  }
  .node-dot-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 3px solid var(--accent);
    color: var(--accent);
    font-size: 14px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s ease;
    flex-shrink: 0;
  }
  .node.highlight .node-dot-btn {
    box-shadow: 0 0 0 5px var(--accent-soft), var(--shadow);
  }
  .node.expanded .node-dot-btn {
    background: var(--accent);
    color: #fff;
    transform: translateY(-6px) scale(1.08);
  }
  .node-label {
    margin-top: 12px;
    font-size: 13px; font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }
  .node-stat {
    margin-top: 3px;
    font-size: 12px; color: var(--text-faint); font-weight: 600;
  }

  .panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin: 0 0 36px;
  }
  .panel.open { display: block; }
  .panel-heading { font-size: 20px; font-weight: 800; margin: 0 0 6px; }
  .panel-subheading { font-size: 14px; color: var(--accent); font-weight: 600; margin: 0 0 16px; }
  .panel-body { font-size: 17px; line-height: 1.65; color: var(--text); margin: 0 0 14px; }
  .panel-bullets { margin: 0 0 14px; padding-left: 20px; }
  .panel-bullets li { font-size: 17px; line-height: 1.6; color: var(--text); margin-bottom: 6px; }
  .panel-caption { font-size: 13px; font-style: italic; color: var(--text-faint); margin: 0; }

  .nav-buttons { display: flex; justify-content: center; gap: 12px; margin-top: 8px; }
  .nav-buttons button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .nav-buttons button:hover { background: var(--accent-soft); }

  .doc-footer { text-align: center; font-size: 12px; color: var(--text-faint); margin-top: 40px; }

  @media (max-width: 640px) {
    .timeline-wrap { overflow-x: visible; padding: 20px 0; }
    .timeline-rail {
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      min-width: 0;
    }
    .timeline-rail::before {
      left: 22px; top: 0; bottom: 0; right: auto;
      width: 3px; height: auto;
    }
    .node {
      flex-direction: row;
      width: 100%;
      align-items: center;
      padding: 14px 0;
      gap: 16px;
    }
    .node-label, .node-stat { margin-top: 0; text-align: left; }
    .node.expanded .node-dot-btn { transform: scale(1.08); }
  }

  .toolbar, .toolbar * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @media print { .toolbar { display: none; } .timeline-wrap { overflow: visible; } }
</style>
</head>
<body data-theme="blue" data-mode="light">

  <div class="toolbar">
    <div class="theme-dots" id="theme-dots">
      <button class="theme-dot active" data-t="blue" title="Blue"></button>
      <button class="theme-dot" data-t="green" title="Green"></button>
      <button class="theme-dot" data-t="purple" title="Purple"></button>
      <button class="theme-dot" data-t="orange" title="Orange"></button>
      <button class="theme-dot" data-t="pink" title="Pink"></button>
    </div>
    <button class="tool-btn" id="mode-toggle">🌙 Dark</button>
    <button class="tool-btn primary" id="pdf-btn">⬇ Download PDF</button>
  </div>

  <div id="doc">

    <div class="doc-header">
      <div class="doc-eyebrow">Timeline</div>
      <h1 class="doc-title">{{TIMELINE_TITLE}}</h1>
      <p class="doc-subtitle">{{TIMELINE_SUBTITLE}}</p>
      <div class="doc-meta">
        <span>{{TIMELINE_DATE}}</span>
        <span>{{TIMELINE_SUMMARY}}</span>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-rail" id="timeline-rail">

        <!-- NODE BLOCK: duplicate this .node div for each slide. Add class "highlight" if this slide's index is in key_moments. -->
        <div class="node" data-index="1">
          <button class="node-dot-btn" aria-expanded="false">1</button>
          <div class="node-label">{{NODE_1_LABEL}}</div>
          <div class="node-stat">{{NODE_1_KEY_STAT}}</div>
        </div>
        <!-- END NODE BLOCK -->

      </div>
    </div>

    <!-- PANEL BLOCK: duplicate this .panel div for each slide, matching data-index to its node above -->
    <div class="panel" data-index="1">
      <h2 class="panel-heading">{{NODE_1_HEADING}}</h2>
      <p class="panel-subheading">{{NODE_1_SUBHEADING}}</p>
      <p class="panel-body">{{NODE_1_BODY}}</p>
      <ul class="panel-bullets">
        <li>{{NODE_1_BULLET_1}}</li>
      </ul>
      <p class="panel-caption">[Visual: {{NODE_1_IMAGE_DESCRIPTION}}]</p>
    </div>
    <!-- END PANEL BLOCK -->

    <div class="nav-buttons">
      <button id="prev-btn">← Previous</button>
      <button id="next-btn">Next →</button>
    </div>

    <div class="doc-footer">{{AUTHOR}}</div>

  </div>

<script>
  (function () {
    var body = document.body;
    var dots = document.querySelectorAll('.theme-dot');
    dots.forEach(function (dot) {
      dot.addEventListener('click', function () {
        body.setAttribute('data-theme', dot.getAttribute('data-t'));
        dots.forEach(function (d) { d.classList.remove('active'); });
        dot.classList.add('active');
      });
    });

    var modeBtn = document.getElementById('mode-toggle');
    modeBtn.addEventListener('click', function () {
      var isDark = body.getAttribute('data-mode') === 'dark';
      body.setAttribute('data-mode', isDark ? 'light' : 'dark');
      modeBtn.textContent = isDark ? '🌙 Dark' : '☀️ Light';
    });

    var pdfBtn = document.getElementById('pdf-btn');
    pdfBtn.addEventListener('click', function () {
      var el = document.getElementById('doc');
      var opt = {
        margin: 0.4,
        filename: '{{TIMELINE_TITLE}}.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(el).save();
    });

    var nodes = Array.prototype.slice.call(document.querySelectorAll('.node'));
    var panels = Array.prototype.slice.call(document.querySelectorAll('.panel'));
    var activeIndex = null;

    function panelFor(index) {
      return panels.filter(function (p) { return p.getAttribute('data-index') === index; })[0];
    }
    function nodeFor(index) {
      return nodes.filter(function (n) { return n.getAttribute('data-index') === index; })[0];
    }

    function closeAll() {
      nodes.forEach(function (n) {
        n.classList.remove('expanded');
        n.querySelector('.node-dot-btn').setAttribute('aria-expanded', 'false');
      });
      panels.forEach(function (p) { p.classList.remove('open'); });
      activeIndex = null;
    }

    function openNode(index) {
      var node = nodeFor(index);
      var panel = panelFor(index);
      if (!node || !panel) return;
      var alreadyOpen = activeIndex === index;
      closeAll();
      if (alreadyOpen) return;
      node.classList.add('expanded');
      node.querySelector('.node-dot-btn').setAttribute('aria-expanded', 'true');
      panel.classList.add('open');
      activeIndex = index;
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    nodes.forEach(function (node) {
      var btn = node.querySelector('.node-dot-btn');
      btn.addEventListener('click', function () {
        openNode(node.getAttribute('data-index'));
      });
    });

    function step(delta) {
      var indices = nodes.map(function (n) { return n.getAttribute('data-index'); });
      var pos = activeIndex ? indices.indexOf(activeIndex) : -1;
      var next = pos + delta;
      if (next < 0) next = 0;
      if (next > indices.length - 1) next = indices.length - 1;
      openNode(indices[next]);
    }

    document.getElementById('prev-btn').addEventListener('click', function () { step(-1); });
    document.getElementById('next-btn').addEventListener('click', function () { step(1); });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowRight') { step(1); }
      else if (e.key === 'ArrowLeft') { step(-1); }
      else if (e.key === 'Enter' || e.key === ' ') {
        if (document.activeElement && document.activeElement.classList.contains('node-dot-btn')) {
          e.preventDefault();
          document.activeElement.click();
        }
      }
    });
  })();
</script>

</body>
</html>

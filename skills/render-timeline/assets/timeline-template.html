<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TIMELINE_TITLE}}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #1c1c1f;
    --surface-solid: #242327;
    --surface-alt: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.14);
    --text: #eef1f8;
    --text-soft: #aab2c5;
    --text-faint: #6e7690;
    --accent: #5b8cff;
    --accent-soft: rgba(91,140,255,0.16);
    --accent-dark: #3a63d4;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --font-serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
  }

  [data-theme="blue"]   { --accent: #5b8cff; --accent-soft: rgba(91,140,255,0.16); --accent-dark: #3a63d4; }
  [data-theme="green"]  { --accent: #3fd690; --accent-soft: rgba(63,214,144,0.16); --accent-dark: #1f9c64; }
  [data-theme="purple"] { --accent: #a684ff; --accent-soft: rgba(166,132,255,0.16); --accent-dark: #7c54e0; }
  [data-theme="orange"] { --accent: #ff9d4d; --accent-soft: rgba(255,157,77,0.16); --accent-dark: #e07820; }
  [data-theme="pink"]   { --accent: #ff6fb0; --accent-soft: rgba(255,111,176,0.16); --accent-dark: #e0468a; }

  body[data-mode="light"] {
    --bg: #f7f3ec;
    --surface-solid: #ffffff;
    --surface-alt: rgba(20,23,31,0.04);
    --border: rgba(20,23,31,0.12);
    --text: #21201c;
    --text-soft: #5b5750;
    --text-faint: #8c877d;
    --shadow: 0 8px 28px rgba(20,30,60,0.1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  /* Hide scrollbars everywhere — scrolling still works, just no visible track/thumb.
     Part of the shared chrome; keep this block in every template. */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  *::-webkit-scrollbar { display: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background-color .25s ease, color .25s ease;
    min-height: 100vh;
  }

  .settings-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-solid);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .settings-toggle:hover { border-color: var(--accent); transform: translateY(-1px); }
  .settings-toggle svg { width: 18px; height: 18px; }

  .settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 100;
    width: 224px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .settings-panel[hidden] { display: none; }

  .settings-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .theme-dots { display: flex; gap: 8px; }
  .theme-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .theme-dot[data-t="blue"]   { background: #5b8cff; }
  .theme-dot[data-t="green"]  { background: #3fd690; }
  .theme-dot[data-t="purple"] { background: #a684ff; }
  .theme-dot[data-t="orange"] { background: #ff9d4d; }
  .theme-dot[data-t="pink"]   { background: #ff6fb0; }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); }

  .settings-panel button.tool-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    font-size: 13px; font-weight: 600;
    padding: 9px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .settings-panel button.tool-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .settings-panel button.tool-btn.primary { background: var(--accent); color: #0a0c12; border-color: var(--accent); }
  .settings-panel button.tool-btn.primary:hover { background: var(--accent-dark); }

  /* The header is one small line — an eyebrow and a title, nothing else.
     This is deliberate: this page's job is the interactive timeline, not a
     title splash, so the header must never be able to grow past a couple
     lines no matter how much text a field is filled with. */
  #doc { max-width: 1180px; margin: 0 auto; padding: 32px 24px 56px; min-height: 100vh; }

  .tl-header { text-align: center; margin-bottom: 40px; }
  .tl-eyebrow {
    display: block;
    font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .tl-title {
    font-family: var(--font-serif);
    font-size: clamp(20px, 2.6vw, 27px); font-weight: 600; margin: 0; line-height: 1.2;
  }

  /* The track is normal page flow — the browser's own scroll, freely,
     nothing boxed or clipped. "Only ~2-3 nodes visible at a time" comes
     purely from generous per-node vertical spacing (`.tl-node`'s padding),
     not from constraining the track's height or giving it its own
     `overflow-y`. A nested scrolling box was tried and explicitly
     rejected — it read as a cramped widget, not a full-screen timeline. */
  .tl-track { position: relative; max-width: 980px; margin: 0 auto; }
  .tl-track::before {
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 2px;
    transform: translateX(-1px);
    background: var(--border);
  }

  .tl-node {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 190px 1fr;
    column-gap: 36px;
    align-items: start;
    padding: 62px 0;
  }

  .tl-node-center {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 2;
  }
  .tl-dot {
    all: unset;
    box-sizing: border-box;
    cursor: pointer;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--surface-solid);
    border: 2px solid var(--text-faint);
    transition: background .2s ease, border-color .2s ease, box-shadow .2s ease, transform .15s ease;
  }
  .tl-node.active .tl-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); transform: scale(1.1); }
  .tl-node.highlight .tl-dot { border-color: var(--accent); }

  .tl-node-index { font-family: var(--font-serif); font-size: 11px; color: var(--text-faint); }
  .tl-node-label {
    all: unset;
    box-sizing: border-box;
    cursor: pointer;
    font-family: var(--font-serif);
    font-size: 15px; font-weight: 600; line-height: 1.3;
    color: var(--text);
    text-align: center;
    max-width: 170px;
  }
  .tl-node.active .tl-node-label { color: var(--accent); }
  .tl-node-stat { font-size: 11px; color: var(--text-faint); text-align: center; }

  .tl-node-detail { display: none; width: 100%; max-width: 360px; padding: 2px; }
  .tl-node.side-left .tl-node-detail { grid-column: 1; justify-self: end; }
  .tl-node.side-right .tl-node-detail { grid-column: 3; justify-self: start; }
  .tl-node.active .tl-node-detail { display: block; }

  .detail-stat { font-size: 12.5px; color: var(--text-faint); font-weight: 600; margin-bottom: 8px; }
  .detail-heading { font-family: var(--font-serif); font-size: 21px; font-weight: 600; margin: 0 0 6px; line-height: 1.25; }
  .detail-subheading { font-size: 14px; color: var(--accent); font-weight: 700; margin: 0 0 12px; }
  .detail-body { font-size: 15.5px; line-height: 1.6; color: var(--text); margin: 0 0 12px; }
  .detail-bullets { margin: 0; padding-left: 18px; }
  .detail-bullets li { font-size: 15px; line-height: 1.55; color: var(--text); margin-bottom: 6px; }

  @media (max-width: 760px) {
    #doc { padding: 24px 18px 48px; }
    .tl-track::before { display: none; }
    .tl-node {
      display: flex;
      flex-direction: column;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .tl-node:last-child { border-bottom: none; }
    .tl-node-center { order: 1; flex-direction: row; align-items: center; gap: 10px; }
    .tl-node-label { text-align: left; max-width: none; }
    .tl-node-stat { text-align: left; }
    .tl-node-detail { order: 2; display: none; width: 100%; max-width: none; margin-top: 12px; padding-left: 25px; }
    .tl-node.active .tl-node-detail { display: block; }
  }

  @media print {
    .settings-toggle, .settings-panel { display: none; }
    .tl-node-detail { display: block !important; }
  }
</style>
</head>
<body data-theme="blue" data-mode="light">

  <button class="settings-toggle" id="settings-toggle" aria-label="Settings" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
    </svg>
  </button>

  <div class="settings-panel" id="settings-panel" hidden>
    <div>
      <div class="settings-label">Theme</div>
      <div class="theme-dots" id="theme-dots">
        <button class="theme-dot active" data-t="blue" title="Blue"></button>
        <button class="theme-dot" data-t="green" title="Green"></button>
        <button class="theme-dot" data-t="purple" title="Purple"></button>
        <button class="theme-dot" data-t="orange" title="Orange"></button>
        <button class="theme-dot" data-t="pink" title="Pink"></button>
      </div>
    </div>
    <button class="tool-btn" id="mode-toggle">🌙 Dark</button>
    <button class="tool-btn primary" id="pdf-btn">⬇ Download PDF</button>
  </div>

  <div id="doc">

    <div class="tl-header">
      <span class="tl-eyebrow">Timeline</span>
      <h1 class="tl-title">{{TIMELINE_TITLE}}</h1>
    </div>

    <div class="tl-track" id="tl-track">

      <!-- NODE BLOCK: duplicate this .tl-node div for each slide.
           Alternate class "side-left" / "side-right" per node (first node =
           "side-left") — that's what sends this node's detail content to the
           left or right column; it's picked by CSS grid-column, not by
           reordering markup, so keep the same internal block order
           (detail markup, then centre markup) for every node regardless of
           which side it's on. Add class "highlight" too if this slide's
           index is in key_moments (outlines the dot in the accent colour).
           The row itself only ever shows a dot + index + short label + stat;
           clicking the dot or the label reveals the full content in that
           node's own detail block — nothing is shared or cloned between
           nodes, so one node's click can never show another node's data. -->
      <div class="tl-node side-left" data-index="1">
        <div class="tl-node-detail">
          <div class="detail-stat">{{NODE_1_KEY_STAT}}</div>
          <h2 class="detail-heading">{{NODE_1_HEADING}}</h2>
          <p class="detail-subheading">{{NODE_1_SUBHEADING}}</p>
          <p class="detail-body">{{NODE_1_BODY}}</p>
          <ul class="detail-bullets">
            <li>{{NODE_1_BULLET_1}}</li>
          </ul>
        </div>
        <div class="tl-node-center">
          <button class="tl-dot" aria-label="Open node 1" aria-expanded="false"></button>
          <span class="tl-node-index">01</span>
          <button class="tl-node-label">{{NODE_1_LABEL}}</button>
          <span class="tl-node-stat">{{NODE_1_KEY_STAT}}</span>
        </div>
      </div>
      <!-- END NODE BLOCK -->

    </div>

  </div>

<script>
  (function () {
    var body = document.body;

    var settingsToggle = document.getElementById('settings-toggle');
    var settingsPanel = document.getElementById('settings-panel');
    settingsToggle.addEventListener('click', function (e) {
      e.stopPropagation();
      var willOpen = settingsPanel.hidden;
      settingsPanel.hidden = !willOpen;
      settingsToggle.setAttribute('aria-expanded', String(willOpen));
    });
    document.addEventListener('click', function (e) {
      if (!settingsPanel.hidden && !settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
        settingsPanel.hidden = true;
        settingsToggle.setAttribute('aria-expanded', 'false');
      }
    });

    var dots = document.querySelectorAll('.theme-dot');
    dots.forEach(function (dot) {
      dot.addEventListener('click', function () {
        body.setAttribute('data-theme', dot.getAttribute('data-t'));
        dots.forEach(function (d) { d.classList.remove('active'); });
        dot.classList.add('active');
      });
    });

    var modeBtn = document.getElementById('mode-toggle');
    modeBtn.addEventListener('click', function () {
      var isLight = body.getAttribute('data-mode') === 'light';
      body.setAttribute('data-mode', isLight ? 'dark' : 'light');
      modeBtn.textContent = isLight ? '☀️ Light' : '🌙 Dark';
    });

    var pdfBtn = document.getElementById('pdf-btn');
    pdfBtn.addEventListener('click', function () {
      var el = document.getElementById('doc');
      var opt = {
        margin: 0.4,
        filename: '{{TIMELINE_TITLE}}.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(el).save();
    });

    var tlNodes = Array.prototype.slice.call(document.querySelectorAll('.tl-node'));
    var activeIndex = null;

    function nodeFor(index) {
      return tlNodes.filter(function (n) { return n.getAttribute('data-index') === index; })[0];
    }

    // Each node's detail block already lives inside that same node, correctly
    // placed on its own side by CSS — this just toggles display, nothing is
    // moved or cloned, so there's no path for one node's click to reveal a
    // different node's content. Clicking an already-open node closes it.
    function selectNode(index) {
      var node = nodeFor(index);
      if (!node) return;
      var alreadyOpen = activeIndex === index;
      tlNodes.forEach(function (n) {
        var isActive = !alreadyOpen && n === node;
        n.classList.toggle('active', isActive);
        n.querySelector('.tl-dot').setAttribute('aria-expanded', String(isActive));
      });
      activeIndex = alreadyOpen ? null : index;
      if (activeIndex) {
        node.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    tlNodes.forEach(function (node) {
      var dot = node.querySelector('.tl-dot');
      var label = node.querySelector('.tl-node-label');
      var trigger = function () { selectNode(node.getAttribute('data-index')); };
      dot.addEventListener('click', trigger);
      label.addEventListener('click', trigger);
    });
  })();
</script>

</body>
</html>
